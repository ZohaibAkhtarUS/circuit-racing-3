const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const BASE_W = 480, BASE_H = 720;
let W = BASE_W, H = BASE_H, scale = 1;
let isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

function resizeCanvas() {
  const ww = window.innerWidth, wh = window.innerHeight, aspect = BASE_W / BASE_H;
  let dw, dh;
  if (ww / wh < aspect) { dw = ww; dh = ww / aspect; } else { dh = wh; dw = wh * aspect; }
  canvas.style.width = dw + 'px'; canvas.style.height = dh + 'px';
  canvas.width = BASE_W; canvas.height = BASE_H; W = BASE_W; H = BASE_H; scale = dw / BASE_W;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── AUDIO ──
let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function snd(freq, dur, type='square', vol=0.12) {
  if (!audioCtx) return;
  try { const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type=type; o.frequency.setValueAtTime(freq,audioCtx.currentTime); g.gain.setValueAtTime(vol,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+dur); } catch(e){}
}
function shootSound(){snd(800,0.08,'square',0.06)} function hitSound(){snd(200,0.2,'sawtooth',0.1)} function explosionSound(){snd(80,0.4,'sawtooth',0.12)}
function playerHitSound(){snd(150,0.5,'sawtooth',0.18)} function bossSound(){snd(60,0.6,'sawtooth',0.2)}
function bombSound(){snd(100,0.6,'sawtooth',0.25);setTimeout(()=>snd(60,0.4,'square',0.2),100)}
function comboSound(m){snd(400+m*100,0.12,'sine',0.1)} function typeSound(){snd(600,0.04,'sine',0.05)}
function errorSound(){snd(200,0.15,'square',0.1);setTimeout(()=>snd(150,0.15,'square',0.1),100)}
function laserSound(){snd(300,0.12,'sawtooth',0.08)} function plasmaSound(){snd(500,0.1,'triangle',0.08)}
function whomWhomWhom(){
  // Hilarious descending wobble death sound
  if(!audioCtx)return;
  for(let i=0;i<3;i++){
    setTimeout(()=>{
      try{
        const o=audioCtx.createOscillator(),g=audioCtx.createGain(),t=audioCtx.currentTime;
        o.type='sine';
        o.frequency.setValueAtTime(250-i*60,t);
        o.frequency.exponentialRampToValueAtTime(80-i*20,t+0.35);
        // Wobble effect
        const lfo=audioCtx.createOscillator(),lfoG=audioCtx.createGain();
        lfo.frequency.value=8+i*3;lfoG.gain.value=30+i*10;
        lfo.connect(lfoG);lfoG.connect(o.frequency);lfo.start(t);lfo.stop(t+0.4);
        g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
        o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.4);
      }catch(e){}
    },i*350);
  }
}
function upgradeSound(){snd(600,0.1,'sine',0.1);setTimeout(()=>snd(800,0.1,'sine',0.1),100);setTimeout(()=>snd(1000,0.15,'sine',0.12),200);}
function helperSound(){snd(500,0.15,'triangle',0.1);setTimeout(()=>snd(700,0.1,'triangle',0.08),150);}

// ── LEADERBOARD ──
function getLeaderboard() { try { return JSON.parse(localStorage.getItem('skyFighterLB') || '[]'); } catch(e) { return []; } }
function saveLeaderboard(lb) { try { localStorage.setItem('skyFighterLB', JSON.stringify(lb)); } catch(e) {} }
function isNameTaken(name) { return getLeaderboard().some(e => e.name.toLowerCase() === name.toLowerCase()); }
function addToLeaderboard(name, score) {
  const lb = getLeaderboard();
  lb.push({ name, score, date: new Date().toLocaleDateString() });
  lb.sort((a, b) => b.score - a.score);
  if (lb.length > 10) lb.length = 10;
  saveLeaderboard(lb);
}

// ── UPGRADE SYSTEM ──
const UPGRADE_POOL = [
  {id:'speed',name:'Speed+',icon:'S',desc:'+0.5 speed',color:'#0f0'},
  {id:'rapid',name:'Rapid Fire',icon:'R',desc:'Faster shooting',color:'#ff0'},

];

// ── PLAYER ──
const player = { x: W/2, y: H-100, w: 36, h: 44, speed: 5, fireRate: 8, fireTimer: 0, invincible: 0, powerLevel: 0, powerTimer: 0 };

// ── INPUT ──
const keys = {};
// Mobile keyboard for name entry
let mobileKeyboard = { active: false, keys: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789', selected: 0 };

window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (state === 'nameEntry') {
    if (e.key === 'Backspace') { playerName = playerName.slice(0, -1); nameError = ''; typeSound(); }
    else if ((e.key === 'Enter') && playerName.length >= 2) { submitName(); }
    else if (e.key.length === 1 && playerName.length < 100 && /[a-zA-Z0-9 ]/.test(e.key)) { playerName += e.key.toUpperCase(); nameError = ''; typeSound(); }
    e.preventDefault(); return;
  }
  if (state === 'menu' && (e.key === ' ' || e.key === 'Enter')) { initAudio(); state='shipSelect'; screenFade=15; return; }
  if (state === 'shipSelect') {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { selectedVehicleIdx=(selectedVehicleIdx-1+VEHICLES.length)%VEHICLES.length; snd(500,0.05,'sine',0.08); }
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { selectedVehicleIdx=(selectedVehicleIdx+1)%VEHICLES.length; snd(500,0.05,'sine',0.08); }
    if (e.key === ' ' || e.key === 'Enter') { startTutorial(); }
    return;
  }
  if (state === 'tutorial' && (e.key === ' ' || e.key === 'Enter')) advanceTutorial();
  if (state === 'upgradeSelect') {
    if(e.key==='1')applyUpgrade(0); else if(e.key==='2')applyUpgrade(1); else if(e.key==='3')applyUpgrade(2);
    else if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){upgradeSelectIdx=(upgradeSelectIdx+2)%3;snd(400,0.04,'sine',0.06);}
    else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){upgradeSelectIdx=(upgradeSelectIdx+1)%3;snd(400,0.04,'sine',0.06);}
    else if(e.key===' '||e.key==='Enter')applyUpgrade(upgradeSelectIdx);
  }
  if (state === 'gameover' && (e.key === ' ' || e.key === 'Enter')) goToMenu();
  if (state === 'playing' && (e.key === 'b' || e.key === 'B')) useBomb();
  if (state === 'playing' && (e.key === 'q' || e.key === 'Q' || e.key === 'Shift')) activateShield();
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.key] = false);

let touchJoystick = { active: false, startX: 0, startY: 0, dx: 0, dy: 0, id: -1 };
let touchFire = false;

function getTouchPos(t) { const r = canvas.getBoundingClientRect(); return { x: (t.clientX-r.left)/scale, y: (t.clientY-r.top)/scale }; }

canvas.addEventListener('touchstart', e => {
  e.preventDefault(); initAudio();
  if (state === 'nameEntry') { handleNameTouch(e); return; }
  if (state === 'menu') { state='shipSelect'; screenFade=15; return; }
  if (state === 'shipSelect') { handleShipSelectTouch(e); return; }
  if (state === 'tutorial') { advanceTutorial(); return; }
  if (state === 'upgradeSelect') { for(const t of e.changedTouches){const p=getTouchPos(t);
    const cardW=130,gap=10,totalW=cardW*3+gap*2,startX=(W-totalW)/2;
    for(let i=0;i<3;i++){if(p.x>=startX+i*(cardW+gap)&&p.x<=startX+i*(cardW+gap)+cardW&&p.y>=H/3&&p.y<=H/3+180){applyUpgrade(i);break;}}} return; }
  if (state === 'gameover') { goToMenu(); return; }
  for (const t of e.changedTouches) {
    const pos = getTouchPos(t);
    if (pos.x > W-70 && pos.y < 70 && state==='playing') { useBomb(); continue; }
    if (pos.x < 70 && pos.y < 70 && state==='playing') { activateShield(); continue; }
    if (pos.x > W/2) touchFire = true;
    if (pos.x <= W/2 && !touchJoystick.active) {
      touchJoystick.active = true; touchJoystick.startX = pos.x; touchJoystick.startY = pos.y;
      touchJoystick.dx = 0; touchJoystick.dy = 0; touchJoystick.id = t.identifier;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchJoystick.id) {
      const pos = getTouchPos(t);
      touchJoystick.dx = pos.x - touchJoystick.startX;
      touchJoystick.dy = pos.y - touchJoystick.startY;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchJoystick.id) { touchJoystick.active = false; touchJoystick.dx = 0; touchJoystick.dy = 0; touchJoystick.id = -1; }
    const pos = getTouchPos(t); if (pos.x > W/2) touchFire = false;
  }
}, { passive: false });
canvas.addEventListener('touchcancel', () => { touchJoystick.active=false; touchJoystick.dx=0; touchJoystick.dy=0; touchFire=false; });

function handleNameTouch(e) {
  for (const t of e.changedTouches) {
    const pos = getTouchPos(t);
    // On-screen keyboard
    const kbY = H/2 + 60;
    const cols = 9, keyW = 38, keyH = 36, padX = (W - cols*keyW)/2;
    const chars = mobileKeyboard.keys;
    for (let i = 0; i < chars.length; i++) {
      const row = Math.floor(i / cols), col = i % cols;
      const kx = padX + col * keyW, ky = kbY + row * keyH;
      if (pos.x >= kx && pos.x < kx+keyW && pos.y >= ky && pos.y < ky+keyH) {
        if (playerName.length < 100) { playerName += chars[i]; nameError = ''; typeSound(); }
        return;
      }
    }
    // Backspace button
    const bkRows = Math.ceil(chars.length / cols);
    const bkY = kbY + bkRows * keyH + 8;
    if (pos.x >= W/2-90 && pos.x <= W/2-10 && pos.y >= bkY && pos.y <= bkY+36) {
      playerName = playerName.slice(0,-1); nameError = ''; typeSound(); return;
    }
    // GO button
    if (pos.x >= W/2+10 && pos.x <= W/2+90 && pos.y >= bkY && pos.y <= bkY+36) {
      if (playerName.length >= 2) submitName();
      return;
    }
  }
}

function submitName() {
  if (playerName.length < 2) { nameError = 'Name too short!'; errorSound(); return; }
  if (isNameTaken(playerName)) { nameError = 'Name already taken!'; errorSound(); return; }
  try { localStorage.setItem('skyFighterPlayerName', playerName); } catch(e) {}
  state = 'menu'; screenFade = 20;
}

function handleShipSelectTouch(e) {
  for (const t of e.changedTouches) {
    const pos = getTouchPos(t);
    // Left arrow
    if (pos.x < W/3 && pos.y > H/3 && pos.y < H*2/3) { selectedVehicleIdx=(selectedVehicleIdx-1+VEHICLES.length)%VEHICLES.length; snd(500,0.05,'sine',0.08); return; }
    // Right arrow
    if (pos.x > W*2/3 && pos.y > H/3 && pos.y < H*2/3) { selectedVehicleIdx=(selectedVehicleIdx+1)%VEHICLES.length; snd(500,0.05,'sine',0.08); return; }
    // Center = select
    if (pos.x >= W/3 && pos.x <= W*2/3) { startTutorial(); return; }
  }
}

// ── ENTITIES ──
let bullets=[], enemies=[], particles=[], powerups=[], enemyBullets=[], bosses=[];
let laserBeams=[]; // for laser weapon rendering

function startTutorial() { state='tutorial'; tutorialStep=0; tutorialTimer=0; screenFade=15; }
function advanceTutorial() { tutorialStep++; tutorialTimer=0; const s=isMobile?TUTORIAL_MOBILE:TUTORIAL_DESKTOP; if(tutorialStep>=s.length) startGame(); }
function goToMenu() { state='shipSelect'; screenFade=20; }

function applyUpgrade(idx) {
  if(idx<0||idx>=upgradeChoices.length) return;
  const u=upgradeChoices[idx];
  collectedUpgrades.push(u);
  if(u.id==='speed'){player.speed+=0.5;upgradeBonuses.speedBonus+=0.5;}
  else if(u.id==='rapid'){player.fireRate=Math.max(2,player.fireRate-1);upgradeBonuses.fireRateBonus+=1;}
  else if(u.id==='damage'){upgradeBonuses.damageBonus+=0.5;}
  else if(u.id==='shield'){shields=Math.min(shields+1,5);}
  else if(u.id==='life'){lives=Math.min(lives+1,6);}
  else if(u.id==='bomb'){bombs=Math.min(bombs+1,6);}
  else if(u.id==='magnet'){upgradeBonuses.magnetActive=true;}
  else if(u.id==='scorex'){upgradeBonuses.scoreMultiplier+=0.5;}
  pendingUpgrade=false;
  state='playing'; screenFade=10;
  upgradeSound();
}

// ── HELPER SYSTEM ──
function checkHelperTriggers() {
  if(helperCooldown>0){helperCooldown--;return;}
  if(activeHelpers.length>=2) return;
  // Low health trigger
  if(lives<=1&&Math.random()<0.005) spawnHelper('support');
  // Boss fight trigger
  if(bossActive&&gameTime%180===0&&Math.random()<0.4) spawnHelper('attacker');
  // Powerup drought
  if(gameTime-lastPowerupTime>1200&&Math.random()<0.003) spawnHelper('any');
}

function spawnHelper(prefer) {
  let pool;
  if(prefer==='support') pool=HELPERS.filter(h=>h.role==='healer'||h.role==='shielder');
  else if(prefer==='attacker') pool=HELPERS.filter(h=>h.role==='attacker');
  else pool=[...HELPERS];
  // Avoid recently used
  const usedIds=activeHelpers.map(h=>h.def.id);
  pool=pool.filter(h=>!usedIds.includes(h.id));
  if(pool.length===0) pool=[...HELPERS];
  const def=pool[Math.floor(Math.random()*pool.length)];
  const fromLeft=Math.random()<0.5;
  const helper={
    def, x:fromLeft?-40:W+40, y:H/2+Math.random()*100-50,
    targetX:player.x+(fromLeft?-60:60), targetY:player.y-40,
    phase:'enter', timer:600+Math.floor(Math.random()*300),
    fireTimer:0, speechBubble:{text:def.greeting,timer:120},
    enterTimer:60
  };
  activeHelpers.push(helper);
  helperCooldown=900; // 15 sec cooldown
  helperSound();
  // Immediate effect for support types
  if(def.role==='healer'){lives=Math.min(lives+1,6);spawnExplosion(player.x,player.y,'#f0f',15);}
  if(def.role==='shielder'){shields=Math.min(shields+1,5);spawnExplosion(player.x,player.y,'#0ff',15);}
  if(def.role==='bomber'){
    enemies.forEach(e=>{score+=e.score;spawnExplosion(e.x,e.y,e.color,8);});
    enemies=[];enemyBullets.forEach(b=>spawnExplosion(b.x,b.y,'#f84',2));enemyBullets=[];
    spawnShockwave(W/2,H/2,250,'#ff0');
  }
}

function updateHelpers() {
  activeHelpers=activeHelpers.filter(h=>{
    h.timer--;
    if(h.speechBubble.timer>0) h.speechBubble.timer--;
    if(h.phase==='enter'){
      h.enterTimer--;
      h.x+=(h.targetX-h.x)*0.08;
      h.y+=(h.targetY-h.y)*0.08;
      if(h.enterTimer<=0) h.phase='active';
    } else if(h.phase==='active'){
      // Follow player with offset
      const ox=h.def.id==='chachu'?-50:h.def.id==='zarrar'?50:h.def.id==='zaviyar'?-40:
               h.def.id==='ayzal'?40:h.def.id==='aleeza'?-30:30;
      h.targetX=player.x+ox; h.targetY=player.y-50;
      h.x+=(h.targetX-h.x)*0.05; h.y+=(h.targetY-h.y)*0.05;
      // Attackers shoot
      if(h.def.weapon&&h.def.role==='attacker'){
        h.fireTimer--;
        if(h.fireTimer<=0){
          h.fireTimer=h.def.fireRate;
          if(h.def.weapon==='heavy') bullets.push({x:h.x,y:h.y-20,w:6,h:16,vy:-8,vx:0,dmg:h.def.dmg,helper:true});
          else if(h.def.weapon==='rapid') bullets.push({x:h.x,y:h.y-18,w:3,h:10,vy:-11,vx:0,dmg:h.def.dmg,helper:true});
          else if(h.def.weapon==='spread'){
            [-0.15,0,0.15].forEach(a=>bullets.push({x:h.x,y:h.y-18,w:3,h:10,vy:-9*Math.cos(a),vx:9*Math.sin(a),dmg:h.def.dmg,helper:true}));
          }
          shootSound();
        }
      }
      // Healer emits green particles
      if(h.def.role==='healer'&&gameTime%10===0) particles.push({x:h.x+(Math.random()-0.5)*20,y:h.y+(Math.random()-0.5)*20,vx:0,vy:-0.5,life:20,maxLife:20,size:2,color:'#0f0',shape:'circle'});
      // Start exit
      if(h.timer<=120){h.phase='exit';h.speechBubble={text:h.def.farewell,timer:100};}
    } else if(h.phase==='exit'){
      h.x+=(h.x<W/2?-4:4);h.y-=1;
      if(h.x<-60||h.x>W+60) return false;
    }
    return h.timer>0;
  });
}

function getVehicle() { return VEHICLES[selectedVehicleIdx]; }

function startGame() {
  const v = getVehicle();
  state='playing'; score=0; displayScore=0; lives=v.lives; level=1; gameTime=0; bombs=v.bombs;
  comboCount=0; comboTimer=0; comboMultiplier=1; maxCombo=0;
  bossActive=false; bossWarning=0; levelDisplay=0; screenFade=15;
  killStreak=0; totalKills=0; rank='Cadet'; streakMessage={text:'',timer:0};
  player.x=W/2; player.y=H-100; player.w=v.w; player.h=v.h; player.speed=v.speed;
  player.fireRate=v.fireRate; player.invincible=60; player.powerLevel=0; player.powerTimer=0; player.fireTimer=0;
  laserActive=false; laserTimer=0; shields=2; shieldActive=false; shieldTimer=0; shieldCooldown=0;
  activeHelpers=[]; helperCooldown=0; lastPowerupTime=0;
  collectedUpgrades=[]; upgradeChoices=[]; pendingUpgrade=false; upgradeSelectIdx=0;
  upgradeBonuses={speedBonus:0,fireRateBonus:0,damageBonus:0,magnetActive:false,scoreMultiplier:1};
  xpFlash=0; bossDefeatMsg={text:'',timer:0}; damageNumbers=[];
  bullets=[]; enemies=[]; particles=[]; powerups=[]; enemyBullets=[]; bosses=[]; engineTrails=[]; shockwaves=[]; laserBeams=[];
}

// ── ENEMY TYPES ──
function createEnemy(type, x, y) {
  const defs = {
    basic:    { w:28,h:28,hp:1,speed:2,  score:100,color:'#e74c3c',shoots:false,pattern:'straight' },
    shooter:  { w:32,h:32,hp:2,speed:1.5,score:200,color:'#e67e22',shoots:true, pattern:'straight' },
    tank:     { w:40,h:40,hp:5,speed:1,  score:500,color:'#9b59b6',shoots:true, pattern:'sine' },
    diver:    { w:26,h:30,hp:1,speed:1,  score:300,color:'#f1c40f',shoots:false,pattern:'dive' },
    shield:   { w:34,h:34,hp:3,speed:1.5,score:400,color:'#1abc9c',shoots:true, pattern:'straight',shielded:true,shieldHp:2 },
    splitter: { w:36,h:36,hp:2,speed:1.2,score:350,color:'#e91e63',shoots:false,pattern:'sine',splits:true },
  };
  const d = defs[type]||defs.basic;
  return { x:x??30+Math.random()*(W-60), y:y??-40, w:d.w, h:d.h, hp:d.hp, maxHp:d.hp, speed:d.speed+level*0.12,
    score:d.score, color:d.color, shoots:d.shoots, shootTimer:60+Math.random()*120,
    pattern:d.pattern, sineOffset:Math.random()*Math.PI*2, baseX:0, diveTarget:null, divePhase:0,
    shielded:d.shielded||false, shieldHp:d.shieldHp||0, splits:d.splits||false, type };
}

let spawnTimer=0, waveCounter=0;
function spawnWave() {
  waveCounter++;
  if (waveCounter%5===0) { spawnFormation(); return; }
  const r=Math.random();
  let e;
  if (level>=4&&r<0.08) e=createEnemy('splitter');
  else if (level>=3&&r<0.18) e=createEnemy('shield');
  else if (level>=2&&r<0.3) { e=createEnemy('diver'); e.diveTarget={x:player.x,y:player.y}; }
  else if (r<0.5) e=createEnemy('shooter');
  else if (r<0.7) e=createEnemy('tank');
  else e=createEnemy('basic');
  e.baseX=e.x; enemies.push(e);
}
function spawnFormation() {
  const f=['v','line','circle'][Math.floor(Math.random()*3)];
  const n=5+Math.floor(Math.random()*3);
  if (f==='v') for(let i=0;i<n;i++){const row=Math.abs(i-Math.floor(n/2));const e=createEnemy('basic',W/2+(i-n/2)*35,-40-row*25);e.baseX=e.x;enemies.push(e);}
  else if(f==='line') for(let i=0;i<n;i++){const e=createEnemy('basic',60+(i*(W-120)/(n-1)),-40-i*15);e.baseX=e.x;enemies.push(e);}
  else{const cx=100+Math.random()*(W-200);for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2;const e=createEnemy('shooter',cx+Math.cos(a)*50,-60+Math.sin(a)*30);e.baseX=e.x;e.pattern='sine';enemies.push(e);}}
}

const BOSS_DEFS = [
  {name:'Storm Hawk',w:80,h:70,hp:50,speed:1.5,score:5000,color:'#ff6d00',enrage:0.25,attacks:['spray','dash']},
  {name:'Iron Fortress',w:110,h:90,hp:100,speed:0.4,score:8000,color:'#78909c',enrage:0.2,attacks:['shield_spray','turrets']},
  {name:'Shadow Serpent',w:90,h:75,hp:80,speed:1.2,score:10000,color:'#7b1fa2',enrage:0.25,attacks:['snake_spray','homing']},
  {name:'Titan Mothership',w:130,h:100,hp:150,speed:0.3,score:15000,color:'#455a64',enrage:0.15,attacks:['ring','minions']},
  {name:'Dark Commander',w:100,h:85,hp:200,speed:1.0,score:25000,color:'#b71c1c',enrage:0.25,attacks:['spray','dash','homing','minions']},
];
function spawnBoss() {
  bossActive=true;
  const bl=Math.floor(level/3);
  const bossIdx=Math.min(bl-1,BOSS_DEFS.length-1);
  const def=BOSS_DEFS[bossIdx];
  const scale=Math.max(1,bl/BOSS_DEFS.length); // scale up for repeated bosses
  bosses.push({
    x:W/2,y:-80,w:def.w,h:def.h,hp:Math.floor(def.hp*scale),maxHp:Math.floor(def.hp*scale),
    speed:def.speed,score:def.score,color:def.color,
    phase:'enter',moveDir:1,attackTimer:0,attackPattern:0,
    enrageThreshold:def.enrage,flashTimer:0,
    bossName:def.name,bossIdx,attacks:def.attacks,
    dashTarget:null,dashPhase:0,shieldUp:false,snakeAngle:0
  });
}

function spawnExplosion(x,y,color,count=15) {
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, sp=1+Math.random()*4;
    const shape = Math.random()<0.3?'square':Math.random()<0.5?'spark':'circle';
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:25+Math.random()*25,maxLife:50,size:2+Math.random()*4,color,shape});
  }
  // White-hot center particles
  for(let i=0;i<Math.floor(count/3);i++){
    const a=Math.random()*Math.PI*2, sp=0.5+Math.random()*2;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:15+Math.random()*10,maxLife:25,size:1+Math.random()*2,color:'#fff',shape:'circle'});
  }
}

function spawnShockwave(x,y,maxR,color) {
  shockwaves.push({x,y,r:5,maxR,life:20,maxLife:20,color});
}

function spawnPowerup(x,y) {
  const r=Math.random();
  if(r<0.06) powerups.push({x,y,w:20,h:20,speed:1.5,type:'shield'});
  else if(r<0.12) powerups.push({x,y,w:20,h:20,speed:1.5,type:'bomb'});
  else if(r<0.22) powerups.push({x,y,w:20,h:20,speed:1.5,type:'power'});
  else if(r<0.28) powerups.push({x,y,w:20,h:20,speed:1.5,type:'life'});
}

function useBomb() {
  if(state!=='playing'||bombs<=0) return;
  bombs--; bombFlash=20; bombSound();
  spawnShockwave(player.x,player.y,300,'#fff');
  enemies.forEach(e=>{score+=e.score*comboMultiplier;spawnExplosion(e.x,e.y,e.color,12);addCombo(e.x,e.y);});
  enemies=[];
  bosses.forEach(b=>{b.hp-=8;b.flashTimer=15;spawnExplosion(b.x,b.y,'#ff0',20);});
  enemyBullets.forEach(b=>spawnExplosion(b.x,b.y,'#f84',3));
  enemyBullets=[];
}

function activateShield() {
  if(state!=='playing'||shields<=0||shieldActive||shieldCooldown>0) return;
  shields--;
  shieldActive=true;
  shieldTimer=SHIELD_DURATION;
  snd(800,0.2,'sine',0.1);snd(1000,0.15,'sine',0.08);
}

function collides(a,b){return a.x-a.w/2<b.x+b.w/2&&a.x+a.w/2>b.x-b.w/2&&a.y-a.h/2<b.y+b.h/2&&a.y+a.h/2>b.y-b.h/2;}

function addCombo(x,y) {
  comboCount++; totalKills++; killStreak++; comboTimer=90;
  if(comboCount>=20)comboMultiplier=5; else if(comboCount>=12)comboMultiplier=4;
  else if(comboCount>=7)comboMultiplier=3; else if(comboCount>=3)comboMultiplier=2; else comboMultiplier=1;
  if(comboCount>maxCombo) maxCombo=comboCount;
  if(comboMultiplier>1){comboDisplay={text:`${comboCount} HIT x${comboMultiplier}`,timer:40,x,y};comboSound(comboMultiplier);}
  const msg=killStreak<streakMsgs.length?streakMsgs[killStreak]:'';
  if(msg){streakMessage={text:msg.replace('BEAST MODE!',playerName.toUpperCase()+' IS A BEAST!'),timer:70};snd(700+killStreak*30,0.15,'sine',0.12);}
}

// ── UPDATE ──
function update() {
  nameBlinkTimer++;
  if(screenFade>0) screenFade--;

  if(state==='tutorial'){tutorialTimer++;return;}
  if(state==='upgradeSelect'){if(screenFade>0)screenFade--;return;}
  if(state!=='playing') return;
  gameTime++;

  // Animated score
  if(displayScore<score) displayScore=Math.min(score, displayScore+Math.ceil((score-displayScore)*0.15));

  const prevLevel=level;
  level=Math.floor(gameTime/1800)+1;
  if(level!==prevLevel){ levelDisplay=120; xpFlash=20;
    // Upgrade every 2 levels
    if(level>1&&level%2===0&&!pendingUpgrade){
      pendingUpgrade=true;
      const pool=[...UPGRADE_POOL].sort(()=>Math.random()-0.5);
      upgradeChoices=pool.slice(0,3);
      upgradeSelectIdx=0;
      state='upgradeSelect'; screenFade=10; upgradeSound();
    }
  }
  if(levelDisplay>0) levelDisplay--;
  if(xpFlash>0) xpFlash--;

  if(level!==prevLevel&&level>1&&level%3===0&&!bossActive) bossWarning=180;
  if(bossWarning>0){bossWarning--;if(bossWarning<=0)spawnBoss();}

  if(comboTimer>0){comboTimer--;if(comboTimer<=0){comboCount=0;comboMultiplier=1;}}
  if(comboDisplay.timer>0)comboDisplay.timer--;
  if(bombFlash>0)bombFlash--;
  if(streakMessage.timer>0)streakMessage.timer--;

  // Rank
  if(totalKills>=100)rank='Air Marshal';else if(totalKills>=60)rank='Wing Commander';
  else if(totalKills>=35)rank='Squadron Leader';else if(totalKills>=20)rank='Flight Captain';
  else if(totalKills>=10)rank='Pilot';else if(totalKills>=3)rank='Rookie';else rank='Cadet';

  // Player movement
  let mx=0,my=0;
  if(keys.ArrowRight||keys.d||keys.D)mx+=1;if(keys.ArrowLeft||keys.a||keys.A)mx-=1;
  if(keys.ArrowDown||keys.s||keys.S)my+=1;if(keys.ArrowUp||keys.w||keys.W)my-=1;
  if(touchJoystick.active){const dz=12,md=60,dist=Math.sqrt(touchJoystick.dx*touchJoystick.dx+touchJoystick.dy*touchJoystick.dy);
    if(dist>dz){mx=Math.max(-1,Math.min(1,touchJoystick.dx/md));my=Math.max(-1,Math.min(1,touchJoystick.dy/md));}}
  player.x+=mx*player.speed;player.y+=my*player.speed;
  player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x));
  player.y=Math.max(player.h/2,Math.min(H-player.h/2,player.y));
  if(player.invincible>0)player.invincible--;
  if(player.powerTimer>0){player.powerTimer--;if(player.powerTimer<=0)player.powerLevel=0;}

  // Engine trails (ships have twin engines, bigger trails)
  const vt=getVehicle().type;
  if(gameTime%2===0){
    if(vt==='ship'){
      const ew=player.w/5;
      engineTrails.push({x:player.x-ew,y:player.y+player.h/2+2,life:18,maxLife:18,size:4+Math.random()*2,ship:true});
      engineTrails.push({x:player.x+ew,y:player.y+player.h/2+2,life:18,maxLife:18,size:4+Math.random()*2,ship:true});
      if(player.powerLevel>=1){
        engineTrails.push({x:player.x-ew-5,y:player.y+player.h/2,life:14,maxLife:14,size:3+Math.random(),ship:true});
        engineTrails.push({x:player.x+ew+5,y:player.y+player.h/2,life:14,maxLife:14,size:3+Math.random(),ship:true});
      }
    } else {
      engineTrails.push({x:player.x,y:player.y+player.h/2+2,life:15,maxLife:15,size:3+Math.random()*2});
      if(player.powerLevel>=1){
        engineTrails.push({x:player.x-8,y:player.y+player.h/2,life:12,maxLife:12,size:2+Math.random()});
        engineTrails.push({x:player.x+8,y:player.y+player.h/2,life:12,maxLife:12,size:2+Math.random()});
      }
    }
  }
  engineTrails=engineTrails.filter(t=>{t.y+=1.5;t.life--;return t.life>0;});

  // Shooting (weapon type depends on vehicle)
  const v=getVehicle();
  const firing=keys[' ']||keys.f||keys.F||touchFire||autoFire;
  const wpn=v.weapon;
  const baseDmg=v.dmg+(player.powerLevel>=2?1:0)+upgradeBonuses.damageBonus;

  // Laser weapons (continuous beam)
  if(wpn==='laser'||wpn==='trilaser') {
    laserActive=firing;
    laserTimer++;
    if(firing&&laserTimer%4===0) laserSound();
    // Laser damage applied directly to enemies/bosses each frame
    if(firing) {
      const laserW=wpn==='trilaser'?(player.powerLevel>=1?3:2):1;
      const offsets=wpn==='trilaser'?(player.powerLevel>=2?[-16,0,16]:(player.powerLevel>=1?[-10,10]:[0])):[0];
      offsets.forEach(ox=>{
        const lx=player.x+ox;
        // Check enemies
        for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];
          if(Math.abs(e.x-lx)<(e.w/2+4)&&e.y<player.y){
            if(gameTime%6===0){
              if(e.shielded&&e.shieldHp>0){e.shieldHp-=0.5;if(e.shieldHp<=0)e.shielded=false;}
              else e.hp-=baseDmg*0.4;
              spawnExplosion(e.x,e.y+e.h/2,'#f0f',2);
              if(e.hp<=0){score+=e.score*comboMultiplier;addCombo(e.x,e.y);spawnExplosion(e.x,e.y,e.color,18);explosionSound();spawnPowerup(e.x,e.y);
                if(e.splits){for(let s=-1;s<=1;s+=2){const c=createEnemy('basic',e.x+s*20,e.y);c.baseX=c.x;c.speed=2.5;enemies.push(c);}}
                enemies.splice(i,1);}
            }
          }
        }
        // Check bosses
        bosses.forEach(b=>{if(Math.abs(b.x-lx)<(b.w/2+6)&&b.y<player.y&&gameTime%6===0){b.hp-=baseDmg*0.3;b.flashTimer=2;spawnExplosion(lx,b.y+b.h/2,'#f0f',2);}});
      });
    }
  }
  // Plasma weapon (big slow projectiles)
  else if(wpn==='plasma') {
    player.fireTimer--;
    if(firing&&player.fireTimer<=0){
      player.fireTimer=player.fireRate; plasmaSound();
      if(player.powerLevel>=2){
        bullets.push({x:player.x-14,y:player.y-18,w:8,h:10,vy:-8,vx:-0.3,dmg:baseDmg,plasma:true});
        bullets.push({x:player.x,y:player.y-22,w:10,h:12,vy:-9,vx:0,dmg:baseDmg+1,plasma:true});
        bullets.push({x:player.x+14,y:player.y-18,w:8,h:10,vy:-8,vx:0.3,dmg:baseDmg,plasma:true});
      }else if(player.powerLevel>=1){
        bullets.push({x:player.x-10,y:player.y-20,w:8,h:10,vy:-8,vx:0,dmg:baseDmg,plasma:true});
        bullets.push({x:player.x+10,y:player.y-20,w:8,h:10,vy:-8,vx:0,dmg:baseDmg,plasma:true});
      }else{
        bullets.push({x:player.x,y:player.y-22,w:10,h:12,vy:-8,vx:0,dmg:baseDmg,plasma:true});
      }
    }
  }
  // Spread weapon (fan pattern)
  else if(wpn==='spread') {
    player.fireTimer--;
    if(firing&&player.fireTimer<=0){
      player.fireTimer=player.fireRate; shootSound();
      const angles=player.powerLevel>=2?[-0.3,-0.15,0,0.15,0.3]:(player.powerLevel>=1?[-0.2,0,0.2]:[-.12,0,.12]);
      angles.forEach(a=>bullets.push({x:player.x,y:player.y-20,w:3,h:10,vy:-v.bulletSpeed*Math.cos(a),vx:v.bulletSpeed*Math.sin(a),dmg:baseDmg}));
    }
  }
  // Rapid weapon (fast small bullets)
  else if(wpn==='rapid') {
    player.fireTimer--;
    if(firing&&player.fireTimer<=0){
      player.fireTimer=player.fireRate; shootSound();
      const ox=(gameTime%2===0?-4:4);
      bullets.push({x:player.x+ox,y:player.y-22,w:3,h:10,vy:-v.bulletSpeed,vx:0,dmg:baseDmg});
      if(player.powerLevel>=1) bullets.push({x:player.x-ox,y:player.y-20,w:3,h:10,vy:-v.bulletSpeed,vx:0,dmg:baseDmg});
      if(player.powerLevel>=2) bullets.push({x:player.x,y:player.y-24,w:4,h:12,vy:-v.bulletSpeed-1,vx:0,dmg:baseDmg});
    }
  }
  // Default bullet weapon
  else {
    player.fireTimer--;
    if(firing&&player.fireTimer<=0){
      player.fireTimer=player.fireRate; shootSound();
      if(player.powerLevel>=2){
        bullets.push({x:player.x-14,y:player.y-18,w:4,h:14,vy:-v.bulletSpeed,vx:-0.5,dmg:baseDmg});
        bullets.push({x:player.x,y:player.y-24,w:5,h:16,vy:-v.bulletSpeed-1,vx:0,dmg:baseDmg});
        bullets.push({x:player.x+14,y:player.y-18,w:4,h:14,vy:-v.bulletSpeed,vx:0.5,dmg:baseDmg});
      }else if(player.powerLevel>=1){
        bullets.push({x:player.x-8,y:player.y-20,w:4,h:14,vy:-v.bulletSpeed,vx:0,dmg:baseDmg});
        bullets.push({x:player.x+8,y:player.y-20,w:4,h:14,vy:-v.bulletSpeed,vx:0,dmg:baseDmg});
      }else{
        bullets.push({x:player.x,y:player.y-22,w:4,h:14,vy:-v.bulletSpeed,vx:0,dmg:baseDmg});
      }
    }
  }

  bullets=bullets.filter(b=>{b.y+=b.vy;b.x+=(b.vx||0);return b.y>-20&&b.x>-20&&b.x<W+20;});
  enemyBullets=enemyBullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;return b.y<H+20&&b.x>-20&&b.x<W+20;});

  // Spawn enemies
  if(!bossActive&&bossWarning<=0){
    const rate=Math.max(15,70-level*6); spawnTimer--;
    if(spawnTimer<=0){spawnWave();spawnTimer=rate;}
  }

  // Update enemies
  enemies=enemies.filter(e=>{
    if(e.pattern==='straight')e.y+=e.speed;
    else if(e.pattern==='sine'){e.y+=e.speed;e.x=e.baseX+Math.sin(gameTime*0.03+e.sineOffset)*45;}
    else if(e.pattern==='dive'){e.divePhase+=0.02;if(e.divePhase<1)e.y+=e.speed*0.5;
      else{if(!e.diveTarget)e.diveTarget={x:player.x,y:player.y};const dx=e.diveTarget.x-e.x,dy=e.diveTarget.y-e.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d>2){e.x+=(dx/d)*e.speed*4;e.y+=(dy/d)*e.speed*4;}else e.y+=e.speed*3;}}
    if(e.shoots&&e.y>0){e.shootTimer--;if(e.shootTimer<=0){e.shootTimer=80+Math.random()*60;
      const dx=player.x-e.x,dy=player.y-e.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>0)enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:(dx/d)*3.5,vy:(dy/d)*3.5,w:6,h:6});}}
    return e.y<H+60&&e.x>-60&&e.x<W+60;
  });

  // Update bosses
  bosses=bosses.filter(boss=>{
    if(boss.flashTimer>0)boss.flashTimer--;
    if(boss.phase==='enter'){boss.y+=1;if(boss.y>=80){boss.phase='fight';boss.attackTimer=60;}}
    else{
      boss.x+=boss.speed*boss.moveDir*(boss.hp<boss.maxHp*boss.enrageThreshold?2:1);
      if(boss.x>W-boss.w/2)boss.moveDir=-1;if(boss.x<boss.w/2)boss.moveDir=1;
      // Snake movement for Shadow Serpent
      if(boss.bossIdx===2){boss.snakeAngle+=0.02;boss.x=W/2+Math.sin(boss.snakeAngle)*150;boss.y=80+Math.sin(boss.snakeAngle*0.7)*40;}
      else{
        boss.x+=boss.speed*boss.moveDir*(boss.hp<boss.maxHp*boss.enrageThreshold?2:1);
        if(boss.x>W-boss.w/2)boss.moveDir=-1;if(boss.x<boss.w/2)boss.moveDir=1;
        // Storm Hawk dash
        if(boss.bossIdx===0&&boss.dashPhase>0){boss.dashPhase--;boss.x+=(boss.dashTarget-boss.x)*0.15;if(boss.dashPhase<=0)spawnExplosion(boss.x,boss.y,'#f80',10);}
      }
      boss.attackTimer--;
      if(boss.attackTimer<=0){
        const atks=boss.attacks||['spray'];
        boss.attackPattern=(boss.attackPattern+1)%atks.length;
        const atk=atks[boss.attackPattern];
        if(atk==='spray'){
          const n=boss.hp<boss.maxHp*boss.enrageThreshold?9:5+boss.bossIdx;
          for(let i=0;i<n;i++){const a=Math.PI/2+(i-n/2)*0.2;enemyBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:Math.cos(a)*3,vy:Math.sin(a)*3,w:6,h:6});}
          boss.attackTimer=35;
        } else if(atk==='dash'){
          boss.dashTarget=boss.x<W/2?W-60:60;boss.dashPhase=30;boss.attackTimer=50;
        } else if(atk==='shield_spray'){
          boss.shieldUp=true;setTimeout(()=>{if(boss)boss.shieldUp=false;},3000);
          for(let i=-2;i<=2;i++){const dx=player.x-boss.x,dy=player.y-boss.y,d=Math.sqrt(dx*dx+dy*dy);
            enemyBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:(dx/d)*3+i*0.3,vy:(dy/d)*3,w:6,h:6});}
          boss.attackTimer=50;
        } else if(atk==='turrets'){
          for(let i=-1;i<=1;i+=2){const e=createEnemy('shooter',boss.x+i*60,boss.y+40);e.baseX=e.x;e.speed=0;enemies.push(e);}
          boss.attackTimer=100;
        } else if(atk==='snake_spray'){
          for(let i=0;i<8;i++){const a=i*Math.PI/4;enemyBullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5,w:6,h:6});}
          boss.attackTimer=45;
        } else if(atk==='homing'){
          const dx=player.x-boss.x,dy=player.y-boss.y,d=Math.sqrt(dx*dx+dy*dy);
          for(let i=0;i<2;i++) setTimeout(()=>{if(bossActive){const ddx=player.x-boss.x,ddy=player.y-boss.y,dd=Math.sqrt(ddx*ddx+ddy*ddy);
            enemyBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:(ddx/dd)*4,vy:(ddy/dd)*4,w:8,h:8});}},i*200);
          boss.attackTimer=70;
        } else if(atk==='ring'){
          for(let i=0;i<12;i++){const a=i*Math.PI*2/12;enemyBullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*2,vy:Math.sin(a)*2,w:6,h:6});}
          boss.attackTimer=80;
        } else if(atk==='minions'){
          for(let i=-1;i<=1;i++){const e=createEnemy('basic',boss.x+i*50,boss.y+boss.h/2+10);e.baseX=e.x;enemies.push(e);}
          boss.attackTimer=90;
        }
        if(boss.hp<boss.maxHp*boss.enrageThreshold)boss.attackTimer=Math.floor(boss.attackTimer*0.6);
      }
    }
    bullets.forEach(b=>{if(b.y<-20)return;if(b.x>boss.x-boss.w/2&&b.x<boss.x+boss.w/2&&b.y>boss.y-boss.h/2&&b.y<boss.y+boss.h/2){
      const dmgAmt=boss.shieldUp?b.dmg*0.5:b.dmg;boss.hp-=dmgAmt;boss.flashTimer=4;b.y=-100;spawnExplosion(b.x,b.y+10,boss.shieldUp?'#0ff':'#ff0',3);hitSound();
      damageNumbers.push({x:b.x+(Math.random()-0.5)*20,y:boss.y-boss.h/2,text:b.dmg.toString(),timer:30,color:'#ff0',big:true});}});
    if(boss.hp<=0){
      score+=boss.score*comboMultiplier;addCombo(boss.x,boss.y);
      spawnExplosion(boss.x,boss.y,'#f44',40);spawnExplosion(boss.x-30,boss.y+20,'#fa0',25);spawnExplosion(boss.x+30,boss.y-10,'#ff0',25);
      spawnShockwave(boss.x,boss.y,200,'#f44');spawnShockwave(boss.x,boss.y,140,'#ff0');
      bossSound();bossActive=false;bombs=Math.min(bombs+1,5);
      bossDefeatMsg={text:BOSS_DEFEAT_MSGS[Math.floor(Math.random()*BOSS_DEFEAT_MSGS.length)].replace('{name}',playerName),timer:180};
      powerups.push({x:boss.x-20,y:boss.y,w:20,h:20,speed:1.5,type:'power'});
      powerups.push({x:boss.x+20,y:boss.y,w:20,h:20,speed:1.5,type:'life'});
      return false;
    }
    if(player.invincible<=0&&collides(boss,player)){if(shieldActive){spawnExplosion(player.x,player.y,'#0ff',10);snd(600,0.08,'sine',0.06);}else damagePlayer();}
    return true;
  });
  bullets=bullets.filter(b=>b.y>-20);

  // Bullet-enemy
  bullets.forEach(b=>{if(b.y<-20)return;for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];if(collides(b,e)){
    if(e.shielded&&e.shieldHp>0){e.shieldHp--;if(e.shieldHp<=0)e.shielded=false;spawnExplosion(b.x,b.y,'#0ff',4);}
    else e.hp-=b.dmg;
    b.y=-100;spawnExplosion(b.x,b.y,'#ff0',4);hitSound();
        damageNumbers.push({x:e.x+(Math.random()-0.5)*10,y:e.y-e.h/2,text:b.dmg.toString(),timer:30,color:'#fff',big:b.dmg>=2});
    if(e.hp<=0){score+=e.score*comboMultiplier;addCombo(e.x,e.y);spawnExplosion(e.x,e.y,e.color,18);explosionSound();spawnPowerup(e.x,e.y);
      if(e.splits){for(let s=-1;s<=1;s+=2){const c=createEnemy('basic',e.x+s*20,e.y);c.baseX=c.x;c.speed=2.5;enemies.push(c);}}
      enemies.splice(i,1);}break;}}});
  bullets=bullets.filter(b=>b.y>-20);

  // Shield update
  if(shieldActive){shieldTimer--;if(shieldTimer<=0){shieldActive=false;shieldCooldown=60;}}
  if(shieldCooldown>0)shieldCooldown--;

  // Enemy bullet-player (shield blocks damage)
  if(player.invincible<=0){for(let i=enemyBullets.length-1;i>=0;i--){if(collides(enemyBullets[i],player)){
    enemyBullets.splice(i,1);
    if(shieldActive){spawnExplosion(player.x,player.y-player.h/2,'#0ff',5);snd(600,0.08,'sine',0.06);}
    else damagePlayer();break;}}}
  if(player.invincible<=0){for(let i=enemies.length-1;i>=0;i--){if(collides(enemies[i],player)){
    spawnExplosion(enemies[i].x,enemies[i].y,enemies[i].color,15);enemies.splice(i,1);
    if(shieldActive){spawnExplosion(player.x,player.y,'#0ff',8);snd(600,0.08,'sine',0.06);}
    else damagePlayer();break;}}}

  // Powerups (with magnet attraction)
  powerups=powerups.filter(p=>{
    p.y+=p.speed;
    if(upgradeBonuses.magnetActive){const dx=player.x-p.x,dy=player.y-p.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<150){p.x+=(dx/dist)*2.5;p.y+=(dy/dist)*2.5;}}
    if(collides(p,player)){
      lastPowerupTime=gameTime;
      if(p.type==='power'){player.powerLevel=Math.min(player.powerLevel+1,2);player.powerTimer=600;snd(600,0.15,'sine',0.1);}
      else if(p.type==='life'){lives=Math.min(lives+1,5);snd(500,0.2,'sine',0.15);}
      else if(p.type==='bomb'){bombs=Math.min(bombs+1,5);snd(400,0.2,'triangle',0.15);}
      else if(p.type==='shield'){shields=Math.min(shields+1,5);snd(700,0.2,'sine',0.12);snd(900,0.15,'sine',0.08);}
      return false;}return p.y<H+20;});

  // Update helpers
  updateHelpers();
  checkHelperTriggers();

  // Particles
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.96;p.vy*=0.96;p.life--;return p.life>0;});

  // Shockwaves
  shockwaves=shockwaves.filter(s=>{s.r+=(s.maxR-5)/s.maxLife;s.life--;return s.life>0;});

  // Shooting stars
  maybeSpawnShootingStar();
  shootingStars=shootingStars.filter(s=>{s.x+=s.vx;s.y+=s.vy;s.life--;return s.life>0;});

  if(shakeTimer>0)shakeTimer--;
  // Update damage numbers
  damageNumbers=damageNumbers.filter(d=>{d.timer--;return d.timer>0;});
  if(damageNumbers.length>30)damageNumbers.splice(0,damageNumbers.length-30);
  // Boss defeat message
  if(bossDefeatMsg.timer>0)bossDefeatMsg.timer--;
  try{if(score>parseInt(localStorage.getItem('skyFighterHigh3')||'0'))localStorage.setItem('skyFighterHigh3',score.toString());}catch(e){}
}

function damagePlayer() {
  lives--; player.invincible=90;
  playerHitSound(); spawnExplosion(player.x,player.y,'#0ff',20);
  comboCount=0;comboTimer=0;comboMultiplier=1;killStreak=0;
  if(lives<=0){
    state='gameover'; screenFade=20;
    spawnExplosion(player.x,player.y,'#ff0',40);
    spawnShockwave(player.x,player.y,150,'#0ff');
    addToLeaderboard(playerName,score);
    whomWhomWhom(); // hilarious death sound!
  }
}
