function drawBackground() {
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#060618');grad.addColorStop(0.5,'#0a0a2e');grad.addColorStop(1,'#140a32');
  ctx.fillStyle=grad;ctx.fillRect(-10,-10,W+20,H+20);

  // Nebula clouds
  nebulae.forEach(n=>{
    n.y+=n.speed; if(n.y>H+n.r)n.y=-n.r;
    const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,n.color);g.addColorStop(1,'transparent');
    ctx.globalAlpha=n.alpha;ctx.fillStyle=g;ctx.fillRect(n.x-n.r,n.y-n.r,n.r*2,n.r*2);
  });
  ctx.globalAlpha=1;

  // Parallax star layers
  for(let l=0;l<3;l++){
    starLayers[l].forEach(s=>{
      s.y+=starSpeeds[l]; if(s.y>H){s.y=0;s.x=Math.random()*W;}
      ctx.fillStyle=`rgba(200,220,255,${s.brightness*(l===0?0.4:l===1?0.6:1)})`;
      ctx.fillRect(s.x,s.y,starSizes[l],starSizes[l]);
    });
  }

  // Shooting stars
  shootingStars.forEach(s=>{
    const alpha=s.life/s.maxLife;
    ctx.strokeStyle=`rgba(200,230,255,${alpha})`;ctx.lineWidth=s.size;
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*5,s.y-s.vy*5);ctx.stroke();
  });
}

function drawPlane(x,y,w,h,color,detail='#fff') {
  ctx.save();ctx.translate(x,y);
  // Body gradient
  const bg=ctx.createLinearGradient(-w/2,0,w/2,0);
  bg.addColorStop(0,color);bg.addColorStop(0.5,lightenColor(color,30));bg.addColorStop(1,color);
  ctx.fillStyle=bg;
  ctx.beginPath();ctx.moveTo(0,-h/2);ctx.lineTo(-w/3,h/4);ctx.lineTo(-w/2,h/2);ctx.lineTo(w/2,h/2);ctx.lineTo(w/3,h/4);ctx.closePath();ctx.fill();
  // Outline
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.stroke();
  // Wings with gradient
  ctx.fillStyle=color;
  ctx.beginPath();ctx.moveTo(-w/3,h/6);ctx.lineTo(-w/2-6,h/3);ctx.lineTo(-w/4,h/3);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(w/3,h/6);ctx.lineTo(w/2+6,h/3);ctx.lineTo(w/4,h/3);ctx.closePath();ctx.fill();ctx.stroke();
  // Panel lines
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(0,-h/3);ctx.lineTo(0,h/3);ctx.stroke();
  // Cockpit with shine
  const cg=ctx.createRadialGradient(-w/10,-h/4,0,0,-h/6,h/4);
  cg.addColorStop(0,'#fff');cg.addColorStop(0.4,detail);cg.addColorStop(1,'rgba(100,150,200,0.5)');
  ctx.fillStyle=cg;
  ctx.beginPath();ctx.ellipse(0,-h/6,w/5.5,h/4.5,0,0,Math.PI*2);ctx.fill();
  // Engine glow
  ctx.fillStyle='#f80';ctx.globalAlpha=0.5+Math.random()*0.5;
  ctx.beginPath();ctx.ellipse(0,h/2+4,4,7+Math.random()*5,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;ctx.restore();
}

function drawShip(x,y,w,h,color,detail='#fff') {
  ctx.save();ctx.translate(x,y);
  // Hull gradient
  const bg=ctx.createLinearGradient(-w/2,-h/2,w/2,h/2);
  bg.addColorStop(0,lightenColor(color,20));bg.addColorStop(0.5,color);bg.addColorStop(1,darkenColor(color,30));
  ctx.fillStyle=bg;
  // Wider, more angular hull shape
  ctx.beginPath();
  ctx.moveTo(0,-h/2);          // nose
  ctx.lineTo(-w/4,-h/3);       // upper left
  ctx.lineTo(-w/2,-h/8);       // wing root left
  ctx.lineTo(-w/2,h/4);        // lower wing left
  ctx.lineTo(-w/3,h/2);        // engine left
  ctx.lineTo(w/3,h/2);         // engine right
  ctx.lineTo(w/2,h/4);         // lower wing right
  ctx.lineTo(w/2,-h/8);        // wing root right
  ctx.lineTo(w/4,-h/3);        // upper right
  ctx.closePath();ctx.fill();
  // Hull outline
  ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.5;ctx.stroke();
  // Armor plates
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(-w/4,-h/4);ctx.lineTo(-w/4,h/4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(w/4,-h/4);ctx.lineTo(w/4,h/4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-w/3,0);ctx.lineTo(w/3,0);ctx.stroke();
  // Cannon mounts (side pods)
  ctx.fillStyle=darkenColor(color,15);
  ctx.fillRect(-w/2-4,-h/8,8,h/3);ctx.fillRect(w/2-4,-h/8,8,h/3);
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.strokeRect(-w/2-4,-h/8,8,h/3);ctx.strokeRect(w/2-4,-h/8,8,h/3);
  // Cannon tips (glow)
  ctx.fillStyle='#f0f';ctx.globalAlpha=0.6+Math.random()*0.4;
  ctx.beginPath();ctx.arc(-w/2,  -h/8-2,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(w/2,   -h/8-2,3,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  // Bridge/cockpit (larger, angular)
  const cg=ctx.createRadialGradient(-w/8,-h/5,0,0,-h/6,h/3);
  cg.addColorStop(0,'rgba(255,255,255,0.9)');cg.addColorStop(0.3,detail);cg.addColorStop(1,'rgba(80,80,120,0.3)');
  ctx.fillStyle=cg;
  ctx.beginPath();
  ctx.moveTo(0,-h/3);ctx.lineTo(-w/6,-h/8);ctx.lineTo(-w/6,h/8);ctx.lineTo(0,h/5);ctx.lineTo(w/6,h/8);ctx.lineTo(w/6,-h/8);ctx.closePath();ctx.fill();
  // Twin engines
  ctx.fillStyle='#40f';ctx.globalAlpha=0.5+Math.random()*0.5;
  ctx.beginPath();ctx.ellipse(-w/5,h/2+4,5,8+Math.random()*5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(w/5,h/2+4,5,8+Math.random()*5,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;ctx.restore();
}

function drawEnemyPlane(x,y,w,h,color,shielded) {
  ctx.save();ctx.translate(x,y);ctx.rotate(Math.PI);
  const bg=ctx.createLinearGradient(-w/2,0,w/2,0);
  bg.addColorStop(0,darkenColor(color,20));bg.addColorStop(0.5,color);bg.addColorStop(1,darkenColor(color,20));
  ctx.fillStyle=bg;
  ctx.beginPath();ctx.moveTo(0,-h/2);ctx.lineTo(-w/3,h/6);ctx.lineTo(-w/2,h/2);ctx.lineTo(w/2,h/2);ctx.lineTo(w/3,h/6);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle=color;
  ctx.beginPath();ctx.moveTo(-w/3,0);ctx.lineTo(-w/2-6,h/4);ctx.lineTo(-w/5,h/4);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(w/3,0);ctx.lineTo(w/2+6,h/4);ctx.lineTo(w/5,h/4);ctx.closePath();ctx.fill();
  ctx.fillStyle='#300';ctx.beginPath();ctx.ellipse(0,-h/6,w/7,h/6,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Shield
  if(shielded){ctx.strokeStyle='#0ff';ctx.lineWidth=2;ctx.globalAlpha=0.4+Math.sin(gameTime*0.1)*0.2;
    ctx.beginPath();ctx.arc(x,y,Math.max(w,h)/2+6,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}
  // HP bar
  const enemy=enemies.find(e=>e.x===x&&e.y===y);
  if(enemy&&enemy.maxHp>1){ctx.fillStyle='#500';ctx.fillRect(x-w/2,y-h/2-8,w,3);ctx.fillStyle='#0f0';ctx.fillRect(x-w/2,y-h/2-8,w*(enemy.hp/enemy.maxHp),3);}
}

function drawBoss(b) {
  const flash=b.flashTimer>0&&b.flashTimer%4<2;
  ctx.save();ctx.translate(b.x,b.y);
  const bg=ctx.createLinearGradient(-b.w/2,0,b.w/2,0);
  bg.addColorStop(0,'#800');bg.addColorStop(0.5,flash?'#fff':b.color);bg.addColorStop(1,'#800');
  ctx.fillStyle=bg;
  ctx.beginPath();ctx.moveTo(0,-b.h/2);ctx.lineTo(-b.w/3,-b.h/4);ctx.lineTo(-b.w/2,b.h/4);ctx.lineTo(-b.w/3,b.h/2);
  ctx.lineTo(b.w/3,b.h/2);ctx.lineTo(b.w/2,b.h/4);ctx.lineTo(b.w/3,-b.h/4);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(255,100,100,0.4)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=flash?'#faa':'#c00';
  ctx.beginPath();ctx.moveTo(-b.w/3,0);ctx.lineTo(-b.w/2-20,b.h/3);ctx.lineTo(-b.w/4,b.h/4);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(b.w/3,0);ctx.lineTo(b.w/2+20,b.h/3);ctx.lineTo(b.w/4,b.h/4);ctx.closePath();ctx.fill();
  ctx.fillStyle='#600';ctx.beginPath();ctx.ellipse(0,0,b.w/5,b.h/4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f40';ctx.globalAlpha=0.7;
  ctx.beginPath();ctx.ellipse(-b.w/4,-b.h/2-5,6,10+Math.random()*6,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(b.w/4,-b.h/2-5,6,10+Math.random()*6,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;ctx.restore();
  // HP bar
  const bw=b.w+40;ctx.fillStyle='#500';ctx.fillRect(b.x-bw/2,b.y-b.h/2-18,bw,6);
  const hr=b.hp/b.maxHp;ctx.fillStyle=hr>0.5?'#0f0':hr>0.25?'#fa0':'#f00';
  ctx.fillRect(b.x-bw/2,b.y-b.h/2-18,bw*hr,6);
  ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.strokeRect(b.x-bw/2,b.y-b.h/2-18,bw,6);
  ctx.fillStyle='#fff';ctx.font='bold 10px "Segoe UI",Arial';ctx.textAlign='center';
  ctx.fillText(b.bossName||'BOSS',b.x,b.y-b.h/2-24);
  // Shield visual for Iron Fortress
  if(b.shieldUp){ctx.strokeStyle='#0ff';ctx.lineWidth=3;ctx.globalAlpha=0.4+Math.sin(gameTime*0.1)*0.2;
    ctx.beginPath();ctx.arc(b.x,b.y,Math.max(b.w,b.h)/2+15,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}
}

function lightenColor(hex,pct){const n=parseInt(hex.slice(1),16);const r=Math.min(255,(n>>16)+pct);const g=Math.min(255,((n>>8)&0xff)+pct);const b=Math.min(255,(n&0xff)+pct);return `rgb(${r},${g},${b})`;}
function darkenColor(hex,pct){const n=parseInt(hex.slice(1),16);const r=Math.max(0,(n>>16)-pct);const g=Math.max(0,((n>>8)&0xff)-pct);const b=Math.max(0,(n&0xff)-pct);return `rgb(${r},${g},${b})`;}

function drawHeart(x,y,size,color,pulse=false) {
  ctx.save();ctx.translate(x,y);
  if(pulse){const s=1+Math.sin(Date.now()*0.01)*0.15;ctx.scale(s,s);}
  ctx.fillStyle=color;
  ctx.beginPath();ctx.moveTo(0,size*0.35);
  ctx.bezierCurveTo(-size*0.1,size*0.15,-size,-size*0.3,0,-size*0.55);
  ctx.bezierCurveTo(size,-size*0.3,size*0.1,size*0.15,0,size*0.35);
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=pulse?10:4;ctx.shadowColor=color;ctx.fill();ctx.shadowBlur=0;
  // Shine
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.beginPath();ctx.ellipse(-size*0.25,-size*0.2,size*0.15,size*0.1,-0.5,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ── DRAW MAIN ──
function draw() {
  ctx.save();
  if(shakeTimer>0){const s=shakeIntensity*(shakeTimer/15);ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s);}

  drawBackground();

  if(state==='nameEntry'){drawNameEntry();ctx.restore();return;}
  if(state==='menu'){drawMenu();ctx.restore();return;}
  if(state==='shipSelect'){drawShipSelect();ctx.restore();return;}
  if(state==='tutorial'){drawTutorial();ctx.restore();return;}

  if(state==='upgradeSelect'){drawUpgradeScreen();ctx.restore();return;}

  if(state==='playing'||state==='gameover') {
    // Engine trails
    engineTrails.forEach(t=>{const a=t.life/t.maxLife;ctx.globalAlpha=a*0.5;
      const g=ctx.createRadialGradient(t.x,t.y,0,t.x,t.y,t.size*a);
      if(t.ship){g.addColorStop(0,'#a0f');g.addColorStop(0.5,'#40f');g.addColorStop(1,'transparent');}
      else{g.addColorStop(0,'#fa0');g.addColorStop(0.5,'#f60');g.addColorStop(1,'transparent');}
      ctx.fillStyle=g;ctx.fillRect(t.x-t.size,t.y-t.size,t.size*2,t.size*2);});
    ctx.globalAlpha=1;

    // Bullets with glow trail
    bullets.forEach(b=>{
      ctx.save();
      if(b.plasma){
        // Plasma orbs
        const pg=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.w);
        pg.addColorStop(0,'#fff');pg.addColorStop(0.3,'#f4f');pg.addColorStop(0.7,'#a0f');pg.addColorStop(1,'rgba(160,0,255,0)');
        ctx.fillStyle=pg;ctx.beginPath();ctx.arc(b.x,b.y,b.w+2,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=10;ctx.shadowColor='#f0f';ctx.beginPath();ctx.arc(b.x,b.y,b.w/2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
      } else {
        const g=ctx.createLinearGradient(b.x,b.y-b.h/2,b.x,b.y+b.h);
        g.addColorStop(0,'#0ff');g.addColorStop(0.4,'#0af');g.addColorStop(1,'rgba(0,170,255,0)');
        ctx.fillStyle=g;ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h+8);
        ctx.shadowBlur=6;ctx.shadowColor='#0ff';
        ctx.fillStyle='#fff';ctx.fillRect(b.x-b.w/2+0.5,b.y-b.h/2,b.w-1,b.h-2);
      }
      ctx.restore();
    });

    // Enemy bullets
    enemyBullets.forEach(b=>{ctx.save();ctx.shadowBlur=6;ctx.shadowColor='#f44';
      const eg=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.w>6?5:3);
      eg.addColorStop(0,'#fff');eg.addColorStop(0.4,'#f44');eg.addColorStop(1,'rgba(255,68,68,0)');
      ctx.fillStyle=eg;ctx.beginPath();ctx.arc(b.x,b.y,b.w>6?6:4,0,Math.PI*2);ctx.fill();ctx.restore();});

    // Enemies
    enemies.forEach(e=>drawEnemyPlane(e.x,e.y,e.w,e.h,e.color,e.shielded&&e.shieldHp>0));
    bosses.forEach(b=>drawBoss(b));

    // Powerups
    powerups.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(gameTime*0.05);
      const c={power:['#ff0','#fa0'],life:['#0f0','#0a0'],bomb:['#f0f','#a0a'],shield:['#0ff','#0aa']}[p.type]||['#ff0','#fa0'];
      // Glow
      ctx.shadowBlur=12;ctx.shadowColor=c[0];
      ctx.fillStyle=c[0];ctx.strokeStyle=c[1];ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(0,-p.h/2);ctx.lineTo(p.w/2,0);ctx.lineTo(0,p.h/2);ctx.lineTo(-p.w/2,0);ctx.closePath();ctx.fill();ctx.stroke();
      ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='bold 10px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(p.type==='power'?'P':p.type==='life'?'+':p.type==='shield'?'S':'B',0,0);ctx.restore();});

    // Laser beams (drawn behind player)
    if(laserActive&&(getVehicle().weapon==='laser'||getVehicle().weapon==='trilaser')){
      const vv=getVehicle();
      const offsets=vv.weapon==='trilaser'?(player.powerLevel>=2?[-16,0,16]:(player.powerLevel>=1?[-10,10]:[0])):[0];
      offsets.forEach(ox=>{
        const lx=player.x+ox;
        ctx.save();
        const lg=ctx.createLinearGradient(lx,0,lx,player.y);
        lg.addColorStop(0,'rgba(200,0,255,0)');lg.addColorStop(0.3,vv.weapon==='trilaser'?'rgba(0,255,255,0.6)':'rgba(200,0,255,0.6)');lg.addColorStop(1,'rgba(255,255,255,0.9)');
        ctx.fillStyle=lg;
        const lw=3+player.powerLevel*1.5+Math.sin(gameTime*0.3)*0.5;
        ctx.fillRect(lx-lw/2,0,lw,player.y-player.h/2);
        // Glow
        ctx.shadowBlur=15;ctx.shadowColor=vv.weapon==='trilaser'?'#0ff':'#f0f';
        ctx.fillRect(lx-lw/4,0,lw/2,player.y-player.h/2);
        ctx.shadowBlur=0;
        ctx.restore();
      });
    }

    // Player
    if(state==='playing'){if(player.invincible<=0||Math.floor(player.invincible/4)%2===0){
      const vv=getVehicle();
      const pc=player.powerLevel>=2?lightenColor(vv.color,40):player.powerLevel>=1?lightenColor(vv.color,20):vv.color;
      if(vv.type==='ship') drawShip(player.x,player.y,player.w,player.h,pc,vv.detail);
      else drawPlane(player.x,player.y,player.w,player.h,pc,vv.detail);
      // Shield bubble
      if(shieldActive){
        const shieldAlpha=shieldTimer<40?shieldTimer/40:0.5+Math.sin(gameTime*0.15)*0.15;
        const shieldR=Math.max(player.w,player.h)/2+12;
        ctx.save();
        ctx.strokeStyle='#0ff';ctx.lineWidth=2.5;ctx.globalAlpha=shieldAlpha;
        ctx.beginPath();ctx.arc(player.x,player.y,shieldR,0,Math.PI*2);ctx.stroke();
        // Inner glow
        const sg=ctx.createRadialGradient(player.x,player.y,shieldR*0.7,player.x,player.y,shieldR);
        sg.addColorStop(0,'rgba(0,255,255,0)');sg.addColorStop(1,'rgba(0,255,255,0.12)');
        ctx.fillStyle=sg;ctx.beginPath();ctx.arc(player.x,player.y,shieldR,0,Math.PI*2);ctx.fill();
        // Hexagonal pattern
        ctx.globalAlpha=shieldAlpha*0.3;ctx.strokeStyle='#0ff';ctx.lineWidth=0.5;
        for(let i=0;i<6;i++){const a=i*Math.PI/3+gameTime*0.02;
          ctx.beginPath();ctx.arc(player.x+Math.cos(a)*shieldR*0.7,player.y+Math.sin(a)*shieldR*0.7,4,0,Math.PI*2);ctx.stroke();}
        ctx.restore();
      }
    }}

    // Family helpers
    activeHelpers.forEach(h=>{
      drawPlane(h.x,h.y,28,36,h.def.color,h.def.detail);
      // Name label
      ctx.fillStyle=h.def.color;ctx.font='bold 10px "Segoe UI",Arial';ctx.textAlign='center';
      ctx.fillText(h.def.name,h.x,h.y+26);
      // Speech bubble
      if(h.speechBubble.timer>0){
        ctx.save();ctx.globalAlpha=Math.min(1,h.speechBubble.timer/20);
        const txt=h.speechBubble.text;
        const tw=ctx.measureText(txt).width||80;
        const bw=tw+16,bh=22,bx=h.x-bw/2,by=h.y-32;
        ctx.fillStyle='rgba(255,255,255,0.9)';
        ctx.beginPath();ctx.moveTo(bx+4,by);ctx.lineTo(bx+bw-4,by);ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+4);
        ctx.lineTo(bx+bw,by+bh-4);ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-4,by+bh);
        ctx.lineTo(bx+bw/2+5,by+bh);ctx.lineTo(bx+bw/2,by+bh+6);ctx.lineTo(bx+bw/2-5,by+bh);
        ctx.lineTo(bx+4,by+bh);ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-4);
        ctx.lineTo(bx,by+4);ctx.quadraticCurveTo(bx,by,bx+4,by);ctx.closePath();ctx.fill();
        ctx.fillStyle='#222';ctx.font='bold 11px "Segoe UI",Arial';ctx.fillText(txt,h.x,by+15);
        ctx.restore();
      }
    });

    // Particles
    particles.forEach(p=>{const a=p.life/p.maxLife;ctx.globalAlpha=a;ctx.fillStyle=p.color;
      const sz=p.size*a;
      if(p.shape==='square'){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.life*0.2);ctx.fillRect(-sz/2,-sz/2,sz,sz);ctx.restore();}
      else if(p.shape==='spark'){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(Math.atan2(p.vy,p.vx));ctx.fillRect(-sz,-sz/4,sz*2,sz/2);ctx.restore();}
      else{ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);ctx.fill();}
    });ctx.globalAlpha=1;

    // Shockwaves
    shockwaves.forEach(s=>{const a=s.life/s.maxLife;ctx.strokeStyle=s.color;ctx.lineWidth=3*a;ctx.globalAlpha=a*0.6;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.stroke();});ctx.globalAlpha=1;

    // Bomb flash
    if(bombFlash>0){ctx.fillStyle=`rgba(255,255,255,${bombFlash/30})`;ctx.fillRect(-10,-10,W+20,H+20);}

    // Combo display
    if(comboDisplay.timer>0){ctx.save();ctx.globalAlpha=comboDisplay.timer/40;
      ctx.fillStyle=comboMultiplier>=4?'#f0f':comboMultiplier>=3?'#fa0':'#ff0';
      ctx.font=`bold ${16+comboMultiplier*2}px "Segoe UI",Arial`;ctx.textAlign='center';
      ctx.fillText(comboDisplay.text,comboDisplay.x,comboDisplay.y-(40-comboDisplay.timer));ctx.restore();}

    // Streak message
    if(streakMessage.timer>0){ctx.save();ctx.globalAlpha=Math.min(1,streakMessage.timer/20);
      ctx.fillStyle='#ff0';ctx.shadowBlur=15;ctx.shadowColor='#fa0';
      ctx.font=`bold ${Math.floor(28*(1+(70-streakMessage.timer)*0.005))}px "Segoe UI",Arial`;
      ctx.textAlign='center';ctx.fillText(streakMessage.text,W/2,H/2-80);ctx.shadowBlur=0;ctx.restore();}

    // Damage numbers
    damageNumbers.forEach(d=>{ctx.save();ctx.globalAlpha=Math.min(1,d.timer/15);
      ctx.fillStyle=d.color;ctx.font=`bold ${d.big?16:12}px "Segoe UI",Arial`;ctx.textAlign='center';
      ctx.fillText(d.text,d.x,d.y-(30-d.timer)*1.5);ctx.restore();});

    // Boss defeat message
    if(bossDefeatMsg.timer>0){ctx.save();ctx.globalAlpha=Math.min(1,bossDefeatMsg.timer/40);
      ctx.fillStyle='#ff0';ctx.shadowBlur=20;ctx.shadowColor='#fa0';
      ctx.font='bold 28px "Segoe UI",Arial';ctx.textAlign='center';
      ctx.fillText(bossDefeatMsg.text,W/2,H/2-120);ctx.shadowBlur=0;ctx.restore();}

    // Boss warning
    if(bossWarning>0){ctx.save();ctx.globalAlpha=Math.sin(bossWarning*0.15)*0.5+0.5;
      ctx.fillStyle='#f00';ctx.font='bold 34px "Segoe UI",Arial';ctx.textAlign='center';
      ctx.fillText('WARNING: BOSS INCOMING',W/2,H/2);
      const bi=Math.min(Math.floor(level/3)-1,BOSS_DEFS.length-1);
      if(bi>=0){ctx.fillStyle='#fa0';ctx.font='bold 22px "Segoe UI",Arial';ctx.fillText(BOSS_DEFS[bi].name,W/2,H/2+35);}
      ctx.restore();}

    // Level up
    if(levelDisplay>0){ctx.save();ctx.globalAlpha=Math.min(1,levelDisplay/30);
      ctx.fillStyle='#0ff';ctx.font='bold 30px "Segoe UI",Arial';ctx.textAlign='center';
      ctx.fillText(`LEVEL ${level}`,W/2,H/2-40);ctx.restore();}

    drawHUD();
    if(isMobile&&state==='playing') drawTouchControls();
    if(state==='gameover') drawGameOver();
  }

  // Screen fade transition
  if(screenFade>0){ctx.fillStyle=`rgba(0,0,0,${screenFade/20})`;ctx.fillRect(0,0,W,H);}

  ctx.restore();
}

// ── NAME ENTRY SCREEN ──
function drawNameEntry() {
  ctx.fillStyle='rgba(5,5,30,0.9)';ctx.fillRect(0,0,W,H);

  // Title
  ctx.save();ctx.shadowBlur=15;ctx.shadowColor='#0af';
  ctx.fillStyle='#0af';ctx.font='bold 36px "Segoe UI",Arial';ctx.textAlign='center';
  ctx.fillText('SKY FIGHTER',W/2,H/6);ctx.shadowBlur=0;

  ctx.fillStyle='#fff';ctx.font='20px "Segoe UI",Arial';
  ctx.fillText('Enter Your Callsign',W/2,H/6+45);

  // Name input box
  const boxW=380,boxH=44,boxX=W/2-boxW/2,boxY=H/3-boxH/2;
  ctx.fillStyle='#111';ctx.fillRect(boxX,boxY,boxW,boxH);
  ctx.strokeStyle=nameError?'#f44':'#0af';ctx.lineWidth=2;ctx.strokeRect(boxX,boxY,boxW,boxH);

  // Name text (shrink font if long, clip to box)
  ctx.save();ctx.beginPath();ctx.rect(boxX+4,boxY,boxW-8,boxH);ctx.clip();
  const nameLen=playerName.length;
  const fontSize=nameLen>20?Math.max(12,24-Math.floor((nameLen-20)/4)):24;
  ctx.fillStyle='#fff';ctx.font=`bold ${fontSize}px "Segoe UI",Arial`;ctx.textAlign='center';
  const displayName = playerName + (Math.floor(nameBlinkTimer/30)%2===0?'|':'');
  ctx.fillText(displayName||'|',W/2,boxY+30);
  ctx.restore();

  // Error message
  if(nameError){ctx.fillStyle='#f44';ctx.font='bold 14px "Segoe UI",Arial';ctx.fillText(nameError,W/2,boxY+boxH+22);}

  // Instructions
  ctx.fillStyle='#888';ctx.font='13px "Segoe UI",Arial';
  ctx.fillText('Min 2 characters, max 100',W/2,boxY-12);

  if(isMobile) {
    // On-screen keyboard
    const kbY=H/2+60, cols=9, keyW=38, keyH=36, padX=(W-cols*keyW)/2;
    const chars=mobileKeyboard.keys;
    for(let i=0;i<chars.length;i++){
      const row=Math.floor(i/cols),col=i%cols;
      const kx=padX+col*keyW,ky=kbY+row*keyH;
      ctx.fillStyle='#1a1a2e';ctx.fillRect(kx+2,ky+2,keyW-4,keyH-4);
      ctx.strokeStyle='#334';ctx.lineWidth=1;ctx.strokeRect(kx+2,ky+2,keyW-4,keyH-4);
      ctx.fillStyle='#ccc';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(chars[i],kx+keyW/2,ky+keyH/2);
    }
    ctx.textBaseline='alphabetic';
    // Backspace & GO buttons
    const bkRows=Math.ceil(chars.length/cols);
    const bkY=kbY+bkRows*keyH+8;
    // Backspace
    ctx.fillStyle='#2a1a1a';ctx.fillRect(W/2-90,bkY,78,36);ctx.strokeStyle='#644';ctx.strokeRect(W/2-90,bkY,78,36);
    ctx.fillStyle='#f88';ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('DELETE',W/2-51,bkY+18);
    // GO
    const goColor=playerName.length>=2?'#1a3a1a':'#1a1a1a';
    ctx.fillStyle=goColor;ctx.fillRect(W/2+10,bkY,78,36);ctx.strokeStyle=playerName.length>=2?'#4a4':'#333';ctx.strokeRect(W/2+10,bkY,78,36);
    ctx.fillStyle=playerName.length>=2?'#4f4':'#555';ctx.fillText('GO!',W/2+49,bkY+18);
    ctx.textBaseline='alphabetic';
  } else {
    ctx.fillStyle='#0ff';ctx.font='16px "Segoe UI",Arial';
    if(playerName.length>=2&&Math.sin(Date.now()*0.005)>0)ctx.fillText('Press ENTER to continue',W/2,H-80);
  }

  // Leaderboard preview
  const lb=getLeaderboard();
  if(lb.length>0){
    ctx.fillStyle='#fa0';ctx.font='bold 14px "Segoe UI",Arial';ctx.textAlign='center';
    const lbY=isMobile?H-50:H/2+80;
    ctx.fillText('LEADERBOARD',W/2,lbY);
    ctx.font='12px "Segoe UI",Arial';
    const show=Math.min(lb.length,isMobile?3:5);
    for(let i=0;i<show;i++){
      ctx.fillStyle=i===0?'#ff0':i===1?'#ccc':i===2?'#c84':'#888';
      ctx.fillText(`${i+1}. ${lb[i].name} - ${lb[i].score.toLocaleString()}`,W/2,lbY+18+i*16);
    }
  }

  ctx.restore();
}

// ── TUTORIAL ──
function drawTutorial() {
  const steps=isMobile?TUTORIAL_MOBILE:TUTORIAL_DESKTOP;
  if(tutorialStep>=steps.length)return;
  const step=steps[tutorialStep];
  const fadeIn=Math.min(1,tutorialTimer/20);

  ctx.fillStyle='rgba(5,5,30,0.88)';ctx.fillRect(0,0,W,H);
  drawPlane(W/2,H/2+120,48,60,'#2196f3','#adf');

  ctx.save();ctx.globalAlpha=fadeIn;
  ctx.fillStyle='#0ff';ctx.shadowBlur=15;ctx.shadowColor='#0af';
  ctx.font='bold 28px "Segoe UI",Arial';ctx.textAlign='center';
  ctx.fillText(step.text.replace('pilot',playerName||'pilot'),W/2,H/3);ctx.shadowBlur=0;
  ctx.fillStyle='#ccc';ctx.font='17px "Segoe UI",Arial';ctx.fillText(step.sub,W/2,H/3+38);

  // Step dots
  for(let i=0;i<steps.length;i++){
    ctx.fillStyle=i===tutorialStep?'#0ff':i<tutorialStep?'#0a6':'#444';
    ctx.beginPath();ctx.arc(W/2+(i-steps.length/2)*18,H/3+72,4,0,Math.PI*2);ctx.fill();}

  // Highlights
  const hl=step.highlight;
  if(hl==='joystick'){ctx.strokeStyle='#0ff';ctx.lineWidth=3;ctx.globalAlpha=0.4+Math.sin(Date.now()*0.005)*0.3;ctx.beginPath();ctx.arc(W/4,H/2+200,60,0,Math.PI*2);ctx.stroke();}
  else if(hl==='keys'){ctx.globalAlpha=0.5+Math.sin(Date.now()*0.005)*0.3;const kx=W/2,ky=H/2+220,ks=28;
    [['W',0,-1],['A',-1,0],['S',0,0],['D',1,0]].forEach(([l,ox,oy])=>{ctx.strokeStyle='#0ff';ctx.lineWidth=2;ctx.strokeRect(kx+ox*ks-ks/2,ky+oy*ks-ks/2,ks,ks);ctx.fillStyle='#0ff';ctx.font='bold 16px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(l,kx+ox*ks,ky+oy*ks);});ctx.textBaseline='alphabetic';}
  else if(hl==='fire'){ctx.globalAlpha=0.4+Math.sin(Date.now()*0.005)*0.3;if(isMobile){ctx.strokeStyle='#f44';ctx.lineWidth=3;ctx.beginPath();ctx.arc(W*3/4,H/2+200,50,0,Math.PI*2);ctx.stroke();}else{ctx.strokeStyle='#0ff';ctx.lineWidth=2;ctx.strokeRect(W/2-60,H/2+246,120,28);ctx.fillStyle='#0ff';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('SPACE',W/2,H/2+260);ctx.textBaseline='alphabetic';}}
  else if(hl==='bomb'){ctx.globalAlpha=0.4+Math.sin(Date.now()*0.005)*0.3;ctx.strokeStyle='#f0f';ctx.lineWidth=3;if(isMobile){ctx.beginPath();ctx.arc(W-35,45,30,0,Math.PI*2);ctx.stroke();}else{ctx.strokeRect(W/2-20,H/2+245,40,30);ctx.fillStyle='#f0f';ctx.font='bold 16px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('B',W/2,H/2+260);ctx.textBaseline='alphabetic';}}
  else if(hl==='progressbar'){ctx.globalAlpha=0.8;const dx=W/2-3,dy=H/2+160,dh=100,dw=5;ctx.fillStyle='#222';ctx.fillRect(dx,dy,dw,dh);ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.strokeRect(dx,dy,dw,dh);ctx.fillStyle='#0f0';ctx.globalAlpha=0.7;ctx.fillRect(dx,dy+dh*0.6,dw,dh*0.4);ctx.globalAlpha=0.8;ctx.fillStyle='#f00';ctx.fillRect(dx-3,dy+1,dw+6,3);ctx.font='bold 9px Arial';ctx.textAlign='right';ctx.fillText('BOSS',dx-5,dy+5);const ay=dy+dh*0.6;ctx.fillStyle='#0f0';ctx.beginPath();ctx.moveTo(dx-4,ay);ctx.lineTo(dx-9,ay-4);ctx.lineTo(dx-9,ay+4);ctx.closePath();ctx.fill();ctx.font='9px Arial';ctx.fillText('YOU',dx-11,ay+3);}

  ctx.globalAlpha=Math.sin(Date.now()*0.005)>0?0.8:0.3;
  ctx.fillStyle='#888';ctx.font='14px "Segoe UI",Arial';ctx.textAlign='center';
  ctx.fillText(isMobile?'Tap to continue':'Press SPACE to continue',W/2,H-50);
  ctx.restore();
}

// ── MENU ──
function drawUpgradeScreen() {
  // Draw frozen game underneath
  drawBackground();
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);

  ctx.save();
  // Title
  ctx.shadowBlur=15;ctx.shadowColor='#fa0';
  ctx.fillStyle='#fa0';ctx.font='bold 28px "Segoe UI",Arial';ctx.textAlign='center';
  ctx.fillText('CHOOSE AN UPGRADE',W/2,H/5);ctx.shadowBlur=0;
  ctx.fillStyle='#aaa';ctx.font='16px "Segoe UI",Arial';
  ctx.fillText(`Level ${level} Complete!`,W/2,H/5+30);

  // 3 cards
  const cardW=130,cardH=170,gap=10,totalW=cardW*3+gap*2,startX=(W-totalW)/2,cardY=H/3;
  for(let i=0;i<3&&i<upgradeChoices.length;i++){
    const u=upgradeChoices[i];
    const sel=i===upgradeSelectIdx;
    const cx=startX+i*(cardW+gap);

    // Card background
    ctx.fillStyle=sel?'rgba(40,40,60,0.95)':'rgba(20,20,35,0.9)';
    ctx.fillRect(cx,cardY,cardW,cardH);
    ctx.strokeStyle=sel?u.color:'#444';ctx.lineWidth=sel?3:1;
    ctx.strokeRect(cx,cardY,cardW,cardH);

    // Glow if selected
    if(sel){ctx.shadowBlur=15;ctx.shadowColor=u.color;ctx.strokeRect(cx,cardY,cardW,cardH);ctx.shadowBlur=0;}

    // Icon
    ctx.fillStyle=u.color;ctx.font='bold 36px "Segoe UI",Arial';ctx.textAlign='center';
    ctx.fillText(u.icon,cx+cardW/2,cardY+55);

    // Name
    ctx.fillStyle='#fff';ctx.font='bold 15px "Segoe UI",Arial';
    ctx.fillText(u.name,cx+cardW/2,cardY+85);

    // Description
    ctx.fillStyle='#aaa';ctx.font='12px "Segoe UI",Arial';
    ctx.fillText(u.desc,cx+cardW/2,cardY+108);

    // Number hint
    ctx.fillStyle='#666';ctx.font='11px "Segoe UI",Arial';
    ctx.fillText(isMobile?'Tap':`Press ${i+1}`,cx+cardW/2,cardY+cardH-12);
  }

  // Bottom hint
  ctx.fillStyle='#888';ctx.font='13px "Segoe UI",Arial';
  ctx.fillText(isMobile?'Tap a card to select':'Arrow keys + SPACE or press 1/2/3',W/2,cardY+cardH+35);

  // Collected upgrades so far
  if(collectedUpgrades.length>0){
    ctx.fillStyle='#666';ctx.font='11px "Segoe UI",Arial';
    ctx.fillText('Upgrades: '+collectedUpgrades.map(u=>u.icon).join(' '),W/2,H-30);
  }
  ctx.restore();
}

function drawShipSelect() {
  ctx.fillStyle='rgba(5,5,30,0.9)';ctx.fillRect(0,0,W,H);
  ctx.save();

  // Title
  ctx.shadowBlur=12;ctx.shadowColor='#0af';
  ctx.fillStyle='#0af';ctx.font='bold 30px "Segoe UI",Arial';ctx.textAlign='center';
  ctx.fillText('CHOOSE YOUR CRAFT',W/2,50);ctx.shadowBlur=0;

  // Category labels
  const v=VEHICLES[selectedVehicleIdx];
  const isShip=v.type==='ship';
  ctx.fillStyle=isShip?'#f0f':'#0ff';ctx.font='bold 16px "Segoe UI",Arial';
  ctx.fillText(isShip?'BATTLESHIP':'FIGHTER PLANE',W/2,80);

  // Navigation arrows
  ctx.fillStyle='#fff';ctx.font='bold 36px Arial';
  ctx.globalAlpha=0.5+Math.sin(Date.now()*0.005)*0.3;
  ctx.textAlign='left';ctx.fillText('<',20,H/2-20);
  ctx.textAlign='right';ctx.fillText('>',W-20,H/2-20);
  ctx.globalAlpha=1;

  // Draw selected vehicle (large preview)
  const previewScale=2.2;
  const px=W/2, py=H/2-50;
  ctx.save();ctx.translate(px,py);ctx.scale(previewScale,previewScale);ctx.translate(-px,-py);
  if(v.type==='ship') drawShip(px,py,v.w,v.h,v.color,v.detail);
  else drawPlane(px,py,v.w,v.h,v.color,v.detail);
  ctx.restore();

  // Vehicle name & description
  ctx.fillStyle='#fff';ctx.font='bold 26px "Segoe UI",Arial';ctx.textAlign='center';
  ctx.fillText(v.name,W/2,py+80);
  ctx.fillStyle='#aaa';ctx.font='15px "Segoe UI",Arial';
  ctx.fillText(v.desc,W/2,py+105);

  // Weapon type label
  const weaponLabels={bullet:'Bullets',spread:'Spread Shot',rapid:'Rapid Fire',laser:'Laser Beam',plasma:'Plasma Cannon',trilaser:'Triple Laser'};
  ctx.fillStyle=isShip?'#f0f':'#0ff';ctx.font='bold 14px "Segoe UI",Arial';
  ctx.fillText('Weapon: '+(weaponLabels[v.weapon]||v.weapon),W/2,py+128);

  // Stats bars
  const statsY=py+155;
  const statNames=['Speed','Power','Defense'];
  const statKeys=['spd','pow','def'];
  const statColors=['#0f0','#f44','#0af'];
  for(let i=0;i<3;i++){
    const sx=W/2-90,sy=statsY+i*28;
    ctx.fillStyle='#888';ctx.font='12px "Segoe UI",Arial';ctx.textAlign='right';
    ctx.fillText(statNames[i],sx-5,sy+12);
    // Bar bg
    ctx.fillStyle='#222';ctx.fillRect(sx,sy,180,14);ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.strokeRect(sx,sy,180,14);
    // Bar fill
    const val=v.stats[statKeys[i]];
    const fg=ctx.createLinearGradient(sx,0,sx+180*val/5,0);
    fg.addColorStop(0,statColors[i]);fg.addColorStop(1,lightenColor(statColors[i].replace('#','#'),20));
    ctx.fillStyle=fg;ctx.fillRect(sx+1,sy+1,178*val/5,12);
    // Dots
    for(let d=1;d<5;d++){ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(sx+178*d/5,sy,1,14);}
  }

  // Lives & bombs display
  ctx.fillStyle='#aaa';ctx.font='12px "Segoe UI",Arial';ctx.textAlign='center';
  ctx.fillText(`Lives: ${v.lives}  |  Bombs: ${v.bombs}`,W/2,statsY+100);

  // Vehicle dots (which one selected)
  for(let i=0;i<VEHICLES.length;i++){
    const dotX=W/2+(i-VEHICLES.length/2+0.5)*22,dotY=statsY+125;
    ctx.fillStyle=i===selectedVehicleIdx?(VEHICLES[i].type==='ship'?'#f0f':'#0ff'):'#444';
    if(i===3)ctx.fillStyle=i===selectedVehicleIdx?'#f0f':'#555'; // separator for ships
    ctx.beginPath();ctx.arc(dotX,dotY,i===selectedVehicleIdx?5:3,0,Math.PI*2);ctx.fill();
  }
  // Labels under dots
  ctx.fillStyle='#666';ctx.font='9px "Segoe UI",Arial';
  ctx.fillText('PLANES',W/2-33,statsY+142);ctx.fillText('SHIPS',W/2+33,statsY+142);

  // Select button
  ctx.fillStyle='#0ff';ctx.font='bold 18px "Segoe UI",Arial';
  if(Math.sin(Date.now()*0.005)>0) ctx.fillText(isMobile?'TAP center to select':'Press SPACE to select',W/2,H-45);

  // Hint
  ctx.fillStyle='#666';ctx.font='12px "Segoe UI",Arial';
  ctx.fillText(isMobile?'Tap sides to browse':'Arrow keys to browse',W/2,H-25);

  ctx.restore();
}

function drawMenu() {
  ctx.save();
  const glow=15+Math.sin(Date.now()*0.003)*10;
  ctx.shadowBlur=glow;ctx.shadowColor='#0af';
  ctx.fillStyle='#0af';ctx.font='bold 42px "Segoe UI",Arial';ctx.textAlign='center';
  ctx.fillText('SKY FIGHTER',W/2,H/5+10);ctx.shadowBlur=0;

  // Player greeting
  ctx.fillStyle='#fff';ctx.font='22px "Segoe UI",Arial';
  ctx.fillText(`Welcome, ${playerName}!`,W/2,H/5+50);

  // Animated stars around title
  for(let i=0;i<5;i++){const a=Date.now()*0.001+i*Math.PI*2/5;ctx.fillStyle='#ff0';ctx.font='14px Arial';ctx.fillText('*',W/2+Math.cos(a)*140,H/5+10+Math.sin(a)*35);}

  ctx.fillStyle='#ccc';ctx.font='15px "Segoe UI",Arial';
  if(isMobile){ctx.fillText('Drag left side to move',W/2,H/2-55);ctx.fillText('Auto-fire is ON!',W/2,H/2-32);ctx.fillText('Tap top-right for BOMB',W/2,H/2-9);}
  else{ctx.fillText('Arrow Keys / WASD to move',W/2,H/2-45);ctx.fillText('Space / F to shoot  |  B for bomb',W/2,H/2-22);}

  ctx.fillStyle='#888';ctx.font='12px "Segoe UI",Arial';
  ctx.fillText('Boss every 3 levels  |  Build combos for big points!',W/2,H/2+15);

  ctx.fillStyle='#0ff';ctx.font='bold 22px "Segoe UI",Arial';
  if(Math.sin(Date.now()*0.005)>0)ctx.fillText(isMobile?'TAP TO FLY!':'Press SPACE to start',W/2,H/2+60);

  // Leaderboard on menu
  const lb=getLeaderboard();
  if(lb.length>0){
    const lbY=H/2+100;
    // Semi-transparent background
    ctx.fillStyle='rgba(0,0,0,0.4)';
    const lbH=Math.min(lb.length,5)*18+30;
    ctx.fillRect(W/2-130,lbY-16,260,lbH);
    ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(W/2-130,lbY-16,260,lbH);

    ctx.fillStyle='#fa0';ctx.font='bold 13px "Segoe UI",Arial';
    ctx.fillText('TOP PILOTS',W/2,lbY);
    ctx.font='12px "Segoe UI",Arial';
    const show=Math.min(lb.length,5);
    for(let i=0;i<show;i++){
      const isMe=lb[i].name.toLowerCase()===playerName.toLowerCase();
      ctx.fillStyle=isMe?'#0ff':i===0?'#ff0':i===1?'#ccc':i===2?'#c84':'#888';
      ctx.fillText(`${i+1}. ${lb[i].name} - ${lb[i].score.toLocaleString()}`,W/2,lbY+18+i*18);
    }
  }

  const demoY=H-80+Math.sin(Date.now()*0.003)*8;
  drawPlane(W/2,demoY,48,60,'#2196f3','#adf');
  ctx.restore();
}

// ── HUD ──
function drawHUD() {
  // Semi-transparent HUD bar
  ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(0,0,W,62);
  ctx.strokeStyle='rgba(100,150,255,0.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,62);ctx.lineTo(W,62);ctx.stroke();

  // Score (animated)
  ctx.fillStyle='#fff';ctx.font='bold 17px "Segoe UI",Arial';ctx.textAlign='left';
  ctx.shadowBlur=2;ctx.shadowColor='rgba(0,0,0,0.5)';
  ctx.fillText(`Score: ${displayScore.toLocaleString()}`,12,22);ctx.shadowBlur=0;

  // Level & rank
  ctx.fillStyle='#aaa';ctx.font='12px "Segoe UI",Arial';
  ctx.fillText(`Lv.${level} | ${rank}`,12,40);

  // Player name
  ctx.fillStyle='#0af';ctx.font='bold 11px "Segoe UI",Arial';
  ctx.fillText(`${playerName} | ${getVehicle().name}`,12,54);

  // Combo
  if(comboMultiplier>1){ctx.fillStyle=comboMultiplier>=4?'#f0f':comboMultiplier>=3?'#fa0':'#ff0';
    ctx.font=`bold 14px "Segoe UI",Arial`;ctx.textAlign='center';ctx.fillText(`x${comboMultiplier} (${comboCount} hits)`,W/2,54);}

  // Hearts (pulse when 1 life)
  ctx.textAlign='right';
  for(let i=0;i<lives;i++) drawHeart(W-16-i*22,18,9,'#f44',lives===1);

  // Bombs
  ctx.fillStyle='#f0f';ctx.font='bold 13px "Segoe UI",Arial';ctx.textAlign='right';
  for(let i=0;i<bombs;i++){ctx.shadowBlur=4;ctx.shadowColor='#f0f';ctx.fillText('*',W-10-i*16,46);ctx.shadowBlur=0;}
  if(bombs>0&&!isMobile){ctx.fillStyle='#666';ctx.font='10px Arial';ctx.fillText('[B]',W-10-bombs*16-5,46);}

  // Shields
  ctx.fillStyle='#0ff';ctx.font='bold 12px "Segoe UI",Arial';ctx.textAlign='left';
  for(let i=0;i<shields;i++){ctx.shadowBlur=3;ctx.shadowColor='#0ff';
    ctx.beginPath();ctx.arc(16+i*18,54+14,5,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;}
  if(shields>0&&!isMobile){ctx.fillStyle='#666';ctx.font='10px Arial';ctx.textAlign='left';ctx.fillText('[Q]',16+shields*18+4,54+18);}
  // Active shield timer bar
  if(shieldActive){
    ctx.fillStyle='#222';ctx.fillRect(12,54+24,80,4);
    ctx.fillStyle='#0ff';ctx.fillRect(12,54+24,80*(shieldTimer/SHIELD_DURATION),4);
  }

  // Power bar
  if(player.powerTimer>0){ctx.fillStyle='#222';ctx.fillRect(W/2-60,6,120,5);
    const pg=ctx.createLinearGradient(W/2-60,0,W/2+60,0);
    pg.addColorStop(0,player.powerLevel>=2?'#00e5ff':'#ff0');pg.addColorStop(1,player.powerLevel>=2?'#0af':'#fa0');
    ctx.fillStyle=pg;ctx.fillRect(W/2-60,6,120*(player.powerTimer/600),5);}

  // XP bar (level progress)
  const xpProg=(gameTime%1800)/1800;
  ctx.fillStyle='#111';ctx.fillRect(0,63,W,3);
  const xpGrad=ctx.createLinearGradient(0,0,W*xpProg,0);
  xpGrad.addColorStop(0,'#0a0');xpGrad.addColorStop(1,'#0f0');
  ctx.fillStyle=xpGrad;ctx.fillRect(0,63,W*xpProg,3);
  if(xpFlash>0){ctx.fillStyle=`rgba(255,255,255,${xpFlash/20})`;ctx.fillRect(0,62,W,5);}

  // Collected upgrade icons
  if(collectedUpgrades.length>0){
    for(let i=0;i<collectedUpgrades.length;i++){
      const u=collectedUpgrades[i];
      ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(12+i*18,78,15,15);
      ctx.fillStyle=u.color;ctx.font='bold 9px Arial';ctx.textAlign='center';
      ctx.fillText(u.icon,12+i*18+7,78+11);
    }
    ctx.textAlign='left';
  }

  // Progress bar
  drawProgressBar();
}

function drawProgressBar() {
  const bx=W-8,by=68,bh=H-140,bw=5;
  ctx.fillStyle='rgba(30,30,50,0.6)';ctx.fillRect(bx-1,by-1,bw+2,bh+2);
  ctx.fillStyle='#181828';ctx.fillRect(bx,by,bw,bh);

  const cycleLen=5400;
  const cycleStart=Math.floor(gameTime/cycleLen)*cycleLen;
  const prog=(gameTime-cycleStart)/cycleLen;

  // Green fill
  const gh=bh*Math.min(1,prog);
  const gg=ctx.createLinearGradient(0,by+bh-gh,0,by+bh);
  gg.addColorStop(0,'#0f0');gg.addColorStop(1,'#0a0');
  ctx.fillStyle=gg;ctx.globalAlpha=0.7;ctx.fillRect(bx,by+bh-gh,bw,gh);ctx.globalAlpha=1;

  // Boss marker (red)
  ctx.fillStyle='#f00';ctx.fillRect(bx-3,by,bw+6,3);
  ctx.shadowBlur=4;ctx.shadowColor='#f00';ctx.fillRect(bx-3,by,bw+6,3);ctx.shadowBlur=0;
  ctx.fillStyle='#f44';ctx.font='bold 7px Arial';ctx.textAlign='right';ctx.fillText('BOSS',bx-4,by+4);

  // Player marker
  const py=by+bh-gh;
  ctx.fillStyle='#0f0';ctx.beginPath();ctx.moveTo(bx-4,py);ctx.lineTo(bx-9,py-4);ctx.lineTo(bx-9,py+4);ctx.closePath();ctx.fill();

  // Level markers
  for(let i=1;i<=2;i++){const my=by+bh-(bh*i/3);ctx.fillStyle='#444';ctx.fillRect(bx-2,my,bw+4,1);
    ctx.fillStyle='#666';ctx.font='7px Arial';ctx.textAlign='right';
    ctx.fillText(`L${Math.floor(gameTime/cycleLen)*3+i+1}`,bx-4,my+3);}
}

function drawTouchControls() {
  ctx.save();ctx.globalAlpha=0.18;
  if(touchJoystick.active){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(touchJoystick.startX,touchJoystick.startY,50,0,Math.PI*2);ctx.stroke();
    const nx=Math.max(-50,Math.min(50,touchJoystick.dx)),ny=Math.max(-50,Math.min(50,touchJoystick.dy));
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(touchJoystick.startX+nx,touchJoystick.startY+ny,18,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#f44';ctx.beginPath();ctx.arc(W-70,H-100,35,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=0.45;ctx.fillStyle='#fff';ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('FIRE',W-70,H-100);
  if(bombs>0){ctx.globalAlpha=0.22;ctx.fillStyle='#f0f';ctx.beginPath();ctx.arc(W-35,45,22,0,Math.PI*2);ctx.fill();ctx.globalAlpha=0.55;ctx.fillStyle='#fff';ctx.font='bold 10px Arial';ctx.fillText('BOMB',W-35,45);}
  // Shield button (top-left)
  if(shields>0&&!shieldActive){ctx.globalAlpha=0.22;ctx.fillStyle='#0ff';ctx.beginPath();ctx.arc(35,45,22,0,Math.PI*2);ctx.fill();ctx.globalAlpha=0.55;ctx.fillStyle='#fff';ctx.font='bold 9px Arial';ctx.fillText('SHIELD',35,45);}
  ctx.textBaseline='alphabetic';ctx.restore();
}

// ── GAME OVER ──
function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.shadowBlur=15;ctx.shadowColor='#f44';
  ctx.fillStyle='#f44';ctx.font='bold 42px "Segoe UI",Arial';ctx.textAlign='center';
  ctx.fillText('GAME OVER',W/2,H/5+20);ctx.shadowBlur=0;

  ctx.fillStyle='#fff';ctx.font='20px "Segoe UI",Arial';
  ctx.fillText(`${playerName}'s Score: ${score.toLocaleString()}`,W/2,H/5+60);

  ctx.fillStyle='#aaa';ctx.font='14px "Segoe UI",Arial';
  ctx.fillText(`Enemies: ${totalKills}  |  Best Combo: ${maxCombo}  |  ${rank}`,W/2,H/5+88);

  // Urdu encouragement
  const goMsg=GAMEOVER_MSGS[Math.floor(score/137)%GAMEOVER_MSGS.length].replace('{name}',playerName);
  ctx.fillStyle='#fa0';ctx.font='bold 16px "Segoe UI",Arial';
  ctx.fillText(goMsg,W/2,H/5+112);

  // Leaderboard
  const lb=getLeaderboard();
  if(lb.length>0){
    const lbY=H/5+125;
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(W/2-140,lbY-18,280,Math.min(lb.length,10)*18+32);
    ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(W/2-140,lbY-18,280,Math.min(lb.length,10)*18+32);
    ctx.fillStyle='#fa0';ctx.font='bold 14px "Segoe UI",Arial';ctx.fillText('LEADERBOARD',W/2,lbY);
    ctx.font='12px "Segoe UI",Arial';
    for(let i=0;i<Math.min(lb.length,10);i++){
      const isMe=lb[i].name.toLowerCase()===playerName.toLowerCase()&&lb[i].score===score;
      ctx.fillStyle=isMe?'#0ff':i===0?'#ff0':i===1?'#ccc':i===2?'#c84':'#888';
      const prefix=isMe?'> ':'  ';
      ctx.fillText(`${prefix}${i+1}. ${lb[i].name} - ${lb[i].score.toLocaleString()}`,W/2,lbY+18+i*18);
    }
  }

  ctx.fillStyle='#0ff';ctx.font='16px "Segoe UI",Arial';
  if(Math.sin(Date.now()*0.005)>0)ctx.fillText(isMobile?'Tap to continue':'Press SPACE to continue',W/2,H-50);
  ctx.restore();
}

// ── GAME LOOP ──
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
